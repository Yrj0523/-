/**
 * storage.js - 本地存储管理
 * IndexedDB 优先，file:// 协议下降级到 localStorage
 */

const DB_NAME = 'TaxAssistantDB';
const DB_VERSION = 1;
const STORE_NAME = 'userRecords';
const LS_KEY = 'tax_records';

const Storage = {
  db: null,
  useFallback: false,  // 是否降级到 localStorage

  async init() {
    // 先检测 IndexedDB 是否可用（file:// 协议下可能不可用）
    if (typeof indexedDB === 'undefined') {
      this.useFallback = true;
      return null;
    }

    try {
      return await new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        // 设定超时，防止某些浏览器卡住
        const timer = setTimeout(() => {
          this.useFallback = true;
          resolve(null);
        }, 3000);

        request.onerror = () => {
          clearTimeout(timer);
          this.useFallback = true;
          resolve(null);  // 不 reject，降级处理
        };
        request.onsuccess = () => {
          clearTimeout(timer);
          this.db = request.result;
          resolve(this.db);
        };
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
            store.createIndex('createdAt', 'createdAt', { unique: false });
          }
        };
      });
    } catch (e) {
      this.useFallback = true;
      return null;
    }
  },

  // ===== localStorage 降级实现 =====

  _lsGetAll() {
    try {
      return JSON.parse(localStorage.getItem(LS_KEY) || '[]');
    } catch {
      return [];
    }
  },

  _lsSaveAll(records) {
    localStorage.setItem(LS_KEY, JSON.stringify(records));
  },

  // ===== 统一接口 =====

  async save(profile) {
    if (this.useFallback || !this.db) {
      const records = this._lsGetAll();
      const record = {
        ...profile,
        id: records.length > 0 ? Math.max(...records.map(r => r.id || 0)) + 1 : 1,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      records.push(record);
      this._lsSaveAll(records);
      return record.id;
    }

    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const record = {
        ...profile,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      const request = store.add(record);
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  },

  async get(id) {
    if (this.useFallback || !this.db) {
      const records = this._lsGetAll();
      return records.find(r => r.id === id) || null;
    }
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const request = store.get(id);
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  },

  async getAll() {
    if (this.useFallback || !this.db) {
      return this._lsGetAll();
    }
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const request = store.getAll();
      request.onsuccess = () => resolve(request.result || []);
      request.onerror = () => reject(request.error);
    });
  },

  async delete(id) {
    if (this.useFallback || !this.db) {
      const records = this._lsGetAll();
      const filtered = records.filter(r => r.id !== id);
      this._lsSaveAll(filtered);
      return true;
    }
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const request = store.delete(id);
      request.onsuccess = () => resolve(true);
      request.onerror = () => reject(request.error);
    });
  },

  async clearAll() {
    if (this.useFallback || !this.db) {
      localStorage.removeItem(LS_KEY);
      return true;
    }
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const request = store.clear();
      request.onsuccess = () => resolve(true);
      request.onerror = () => reject(request.error);
    });
  }
};

// Session storage for current questionnaire progress
const SessionStorage = {
  get(key) {
    try {
      const val = sessionStorage.getItem('tax_' + key);
      return val ? JSON.parse(val) : null;
    } catch {
      return null;
    }
  },

  set(key, value) {
    try {
      sessionStorage.setItem('tax_' + key, JSON.stringify(value));
    } catch {}
  },

  remove(key) {
    try {
      sessionStorage.removeItem('tax_' + key);
    } catch {}
  },

  clear() {
    try {
      Object.keys(sessionStorage)
        .filter(k => k.startsWith('tax_'))
        .forEach(k => sessionStorage.removeItem(k));
    } catch {}
  }
};


/**
 * survey.js - 问卷引擎
 * 动态渲染问卷题目，支持条件分支（showIf）、动态列表、分步导航
 */

const Survey = {
  config: null,
  cities: null,
  currentStep: 0,
  totalSteps: 0,
  answers: {},

  async init() {
    this.config = TaxData.surveyConfig;
    this.cities = TaxData.cities;
  },

  /**
   * 获取所有可见的section（考虑条件分支）
   */
  getVisibleSections() {
    return this.config.sections.filter(section => {
      // section级别不直接控制可见性，由内部question的showIf控制
      return true;
    });
  },

  /**
   * 评估showIf条件
   */
  evaluateCondition(condition) {
    if (!condition) return true;
    // 格式: "field == value" 或 "field == true"
    const match = condition.match(/(\w+)\s*==\s*(.+)/);
    if (!match) return true;
    const [, field, value] = match;
    const actualValue = this.answers[field];
    const expectedValue = value.trim().replace(/^["']|["']$/g, '');
    if (expectedValue === 'true') return actualValue === true || actualValue === 'true';
    if (expectedValue === 'false') return actualValue === false || actualValue === 'false';
    return String(actualValue) === expectedValue;
  },

  /**
   * 获取某个section下可见的题目
   */
  getVisibleQuestions(section) {
    if (!section.questions) return [];
    return section.questions.filter(q => this.evaluateCondition(q.showIf));
  },

  /**
   * 渲染整个问卷界面
   */
  render(container) {
    const sections = this.getVisibleSections();
    this.totalSteps = sections.length;
    if (this.currentStep >= this.totalSteps) this.currentStep = 0;

    const section = sections[this.currentStep];
    const visibleQuestions = this.getVisibleQuestions(section);
    const progress = ((this.currentStep + 1) / this.totalSteps) * 100;

    container.innerHTML = `
      <div class="survey-container">
        <div class="survey-progress-bar">
          <div class="progress-fill" style="width: ${progress}%"></div>
          <span class="progress-text">第 ${this.currentStep + 1} / ${this.totalSteps} 步</span>
        </div>

        <div class="survey-section">
          <h2 class="section-title">${section.title}</h2>
          <div class="section-questions" id="sectionQuestions">
            ${visibleQuestions.map(q => this.renderQuestion(q)).join('')}
          </div>
        </div>

        <div class="survey-actions">
          ${this.currentStep > 0 ? '<button class="btn btn-secondary" onclick="Survey.prevStep()">上一步</button>' : ''}
          ${this.currentStep < this.totalSteps - 1
            ? '<button class="btn btn-primary" onclick="Survey.nextStep()">下一步</button>'
            : '<button class="btn btn-success" onclick="Survey.finish()">生成填报指引</button>'}
        </div>
      </div>
    `;

    // 绑定事件
    this.bindEvents(container);
  },

  /**
   * 渲染单个题目
   */
  renderQuestion(q) {
    const currentVal = this.answers[q.id] !== undefined ? this.answers[q.id] : (q.default !== undefined ? q.default : '');

    switch (q.type) {
      case 'number':
        return this.renderNumber(q, currentVal);
      case 'boolean':
        return this.renderBoolean(q, currentVal);
      case 'select':
        return this.renderSelect(q, currentVal);
      case 'radio':
        return this.renderRadio(q, currentVal);
      case 'date':
        return this.renderDate(q, currentVal);
      case 'dynamic_list':
        return this.renderDynamicList(q, currentVal);
      case 'summary':
        return this.renderSummaryField(q);
      default:
        return '';
    }
  },

  renderNumber(q, val) {
    return `
      <div class="question" data-qid="${q.id}">
        <label class="q-label">${q.label}${q.required ? '<span class="required">*</span>' : ''}</label>
        ${q.subtitle ? `<p class="q-subtitle">${q.subtitle}</p>` : ''}
        <div class="input-group">
          <input type="number" class="q-input" id="q_${q.id}" value="${val}" placeholder="${q.placeholder || ''}" inputmode="numeric" onchange="Survey.setAnswer('${q.id}', Number(this.value)); Survey.updateSummaryFields();">
          ${q.unit ? `<span class="input-suffix">${q.unit}</span>` : ''}
        </div>
      </div>
    `;
  },

  /**
   * 渲染实时合计字段（summary类型）
   * 根据配置的 fields 和条件，实时计算各字段总和（含限额）
   */
  renderSummaryField(q) {
    const config = q.computeFields || {};
    const fields = config.fields || [];
    const unit = config.unit || '元';

    // 计算当前合计
    let total = 0;
    const breakdown = [];
    fields.forEach(f => {
      if (this.evaluateCondition(f.showIf)) {
        let val = Number(this.answers[f.id]) || 0;
        const original = val;
        // 先套限额
        if (f.max !== null && f.max !== undefined) {
          val = Math.min(val, f.max);
        }
        // 再按比例计算（如展业成本 = 佣金 × 25%）
        const rate = f.rate !== undefined && f.rate !== null ? f.rate : 1;
        const afterRate = Math.round(val * rate);
        if (afterRate > 0) {
          total += afterRate;
          const rateNote = rate < 1 ? `<span class="summary-cap">(佣金${original.toLocaleString()} × ${rate * 100}%)</span>` : '';
          const capNote = f.max !== null && f.max !== undefined && original > f.max
            ? `<span class="summary-cap">(填报${original.toLocaleString()}，限额${f.max.toLocaleString()})</span>`
            : '';
          breakdown.push({ label: f.label || f.id, original, final: afterRate, rateNote, capNote });
        }
      }
    });

    // 构建明细行
    const breakdownHtml = breakdown.length > 0 ? breakdown.map(b => {
      const notes = (b.rateNote || '') + (b.capNote || '');
      return `<div class="summary-breakdown-row"><span>${b.label}</span><span class="summary-amount">${b.final.toLocaleString()} ${unit} ${notes}</span></div>`;
    }).join('') : '<div class="summary-breakdown-row empty">请先填写上方各项金额</div>';

    return `
      <div class="question summary-field" data-qid="${q.id}" id="${q.id}_container">
        <label class="q-label">${q.label}</label>
        ${q.subtitle ? `<p class="q-subtitle">${q.subtitle}</p>` : ''}
        <div class="summary-breakdown">${breakdownHtml}</div>
        <div class="summary-total-row">
          <span class="summary-total-label">合计</span>
          <span class="summary-total-value" id="${q.id}_value">${total.toLocaleString()} ${unit}</span>
        </div>
      </div>
    `;
  },

  /**
   * 更新所有 summary 类型字段的实时合计
   * 在 number 输入 onchange 后调用
   */
  updateSummaryFields() {
    const sections = this.getVisibleSections();
    for (const section of sections) {
      const questions = this.getVisibleQuestions(section);
      for (const q of questions) {
        if (q.type === 'summary') {
          const container = document.getElementById(q.id + '_container');
          if (container) {
            // 重新渲染该 summary 字段
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = this.renderSummaryField(q);
            const newEl = tempDiv.firstElementChild;
            if (newEl) {
              container.replaceWith(newEl);
            }
          }
        }
      }
    }
  },

  renderBoolean(q, val) {
    return `
      <div class="question" data-qid="${q.id}">
        <label class="q-label">${q.label}${q.required ? '<span class="required">*</span>' : ''}</label>
        ${q.subtitle ? `<p class="q-subtitle">${q.subtitle}</p>` : ''}
        <div class="boolean-group">
          <button class="bool-btn ${val === true ? 'active' : ''}" data-value="true" onclick="Survey.setBoolean('${q.id}', true)">是</button>
          <button class="bool-btn ${val === false ? 'active' : ''}" data-value="false" onclick="Survey.setBoolean('${q.id}', false)">否</button>
        </div>
      </div>
    `;
  },

  renderSelect(q, val) {
    let options = '';
    if (q.options_source === 'cities') {
      options = this.renderCityOptions(val);
    } else if (Array.isArray(q.options)) {
      if (typeof q.options[0] === 'string') {
        options = `<option value="">请选择</option>` + q.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('');
      } else {
        options = `<option value="">请选择</option>` + q.options.map(o => `<option value="${o.value}" ${val === o.value ? 'selected' : ''}>${o.label}</option>`).join('');
      }
    }
    return `
      <div class="question" data-qid="${q.id}">
        <label class="q-label">${q.label}${q.required ? '<span class="required">*</span>' : ''}</label>
        ${q.subtitle ? `<p class="q-subtitle">${q.subtitle}</p>` : ''}
        <select class="q-select" id="q_${q.id}" onchange="Survey.setAnswer('${q.id}', this.value)">
          ${options}
        </select>
      </div>
    `;
  },

  renderCityOptions(val) {
    const tier1 = this.cities.tier1 || [];
    let html = '<option value="">请选择城市</option>';
    html += '<optgroup label="直辖市/省会（1500元/月）">';
    tier1.forEach(c => html += `<option value="${c}" ${val === c ? 'selected' : ''}>${c}</option>`);
    html += '</optgroup>';
    html += '<optgroup label="其他城市">';
    const others = ['苏州市', '温州市', '佛山市', '东莞市', '徐州市', '临沂市', '保定市', '南通市', '泰州市', '盐城市', '扬州市', '镇江市', '连云港市', '其他'];
    others.forEach(c => html += `<option value="${c}" ${val === c ? 'selected' : ''}>${c}</option>`);
    html += '</optgroup>';
    return html;
  },

  renderRadio(q, val) {
    const options = q.options || [];

    // 检查 dynamicLabel 条件：满足时显示固定值而非选项列表
    if (q.dynamicLabel && this.evaluateCondition(q.dynamicLabel.showIf)) {
      const fixedValue = q.dynamicLabel.fixedValue;
      const displayLabel = q.dynamicLabel.fixedValue === '100' ? '您全额扣除（100%）' : q.dynamicLabel.fixedValue;
      // 自动设置答案
      this.answers[q.id] = fixedValue;
      return `
        <div class="question" data-qid="${q.id}">
          <label class="q-label">${q.dynamicLabel.label || q.label}</label>
          ${q.dynamicLabel.subtitle ? `<p class="q-subtitle">${q.dynamicLabel.subtitle}</p>` : ''}
          <div class="radio-group">
            <label class="radio-item checked" style="opacity:0.7;pointer-events:none;">
              <input type="radio" name="radio_${q.id}" value="${fixedValue}" checked disabled>
              <span class="radio-label">${displayLabel}</span>
            </label>
          </div>
        </div>
      `;
    }

    return `
      <div class="question" data-qid="${q.id}">
        <label class="q-label">${q.label}${q.required ? '<span class="required">*</span>' : ''}</label>
        ${q.subtitle ? `<p class="q-subtitle">${q.subtitle}</p>` : ''}
        <div class="radio-group">
          ${options.map(o => `
            <label class="radio-item ${String(val) === String(o.value) ? 'checked' : ''}">
              <input type="radio" name="radio_${q.id}" value="${o.value}" ${String(val) === String(o.value) ? 'checked' : ''} onchange="Survey.setAnswer('${q.id}', this.value)">
              <span class="radio-label">${o.label}</span>
            </label>
          `).join('')}
        </div>
      </div>
    `;
  },

  renderDate(q, val) {
    return `
      <div class="question" data-qid="${q.id}">
        <label class="q-label">${q.label}${q.required ? '<span class="required">*</span>' : ''}</label>
        <input type="date" class="q-input q-date" id="q_${q.id}" value="${val || ''}" onchange="Survey.setAnswer('${q.id}', this.value)">
      </div>
    `;
  },

  renderDynamicList(q, val) {
    const items = Array.isArray(val) ? val : [];
    return `
      <div class="question dynamic-list" data-qid="${q.id}">
        <label class="q-label">${q.label}${q.required ? '<span class="required">*</span>' : ''}</label>
        <div class="list-items" id="list_${q.id}">
          ${items.map((item, i) => this.renderListItem(q, item, i)).join('')}
        </div>
        <button class="btn btn-outline btn-add" onclick="Survey.addListItem('${q.id}')">${q.addLabel || '+ 添加'}</button>
      </div>
    `;
  },

  renderListItem(q, item, index) {
    const fields = q.fields || [];
    return `
      <div class="list-item" data-index="${index}">
        <div class="list-item-header">
          <span>第 ${index + 1} 项</span>
          <button class="btn-remove" onclick="Survey.removeListItem('${q.id}', ${index})">×</button>
        </div>
        ${fields.map(f => {
          const val = item ? item[f.id] : '';
          if (f.type === 'date') {
            return `<input type="date" class="q-input q-date-sm" placeholder="${f.label}" value="${val || ''}" onchange="Survey.updateListItem('${q.id}', ${index}, '${f.id}', this.value)">`;
          }
          if (f.type === 'select') {
            return `<select class="q-select-sm" onchange="Survey.updateListItem('${q.id}', ${index}, '${f.id}', this.value)">
              <option value="">${f.label}</option>
              ${f.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('')}
            </select>`;
          }
          return '';
        }).join('')}
      </div>
    `;
  },

  // ===== 事件处理 =====

  bindEvents(container) {
    // 数字输入框
    container.querySelectorAll('.q-input[type="number"]').forEach(input => {
      input.addEventListener('input', (e) => {
        const id = e.target.id.replace('q_', '');
        this.setAnswer(id, e.target.value === '' ? '' : Number(e.target.value));
      });
    });
  },

  setAnswer(id, value) {
    this.answers[id] = value;
    // 如果是radio类型，不影响条件分支，不需要重新渲染
  },

  setBoolean(id, value) {
    this.answers[id] = value;
    // 更新按钮状态
    const question = document.querySelector(`[data-qid="${id}"]`);
    if (question) {
      question.querySelectorAll('.bool-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.value === String(value));
      });
    }
    // 重新渲染前先保存当前所有输入值
    this.syncInputValues();
    // 检查是否需要重新渲染（条件分支）
    this.checkRerender();
  },

  // 重新渲染前同步所有输入框的当前值到answers
  syncInputValues() {
    const container = document.getElementById('sectionQuestions');
    if (!container) return;
    // 数字输入框
    container.querySelectorAll('.q-input[type="number"]').forEach(function(input) {
      const id = input.id.replace('q_', '');
      if (input.value !== '') {
        this[id] = Number(input.value);
      }
    }.bind(this.answers));
    // 日期
    container.querySelectorAll('.q-input[type="date"]').forEach(function(input) {
      const id = input.id.replace('q_', '');
      if (input.value) this[id] = input.value;
    }.bind(this.answers));
    // select
    container.querySelectorAll('.q-select').forEach(function(sel) {
      const id = sel.id.replace('q_', '');
      if (sel.value) this[id] = sel.value;
    }.bind(this.answers));
    // radio
    container.querySelectorAll('.radio-item input[type="radio"]:checked').forEach(function(radio) {
      const name = radio.name.replace('radio_', '');
      this[name] = radio.value;
    }.bind(this.answers));
  },

  checkRerender() {
    const sections = this.getVisibleSections();
    const section = sections[this.currentStep];
    const currentVisible = this.getVisibleQuestions(section);
    const renderedQuestions = document.querySelectorAll('#sectionQuestions .question');

    // 如果可见题目数量变化，重新渲染当前section
    if (currentVisible.length !== renderedQuestions.length) {
      const container = document.getElementById('sectionQuestions');
      if (container) {
        container.innerHTML = currentVisible.map(q => this.renderQuestion(q)).join('');
      }
    }
  },

  addListItem(qid) {
    if (!Array.isArray(this.answers[qid])) this.answers[qid] = [];
    this.answers[qid].push({});
    this.rerenderList(qid);
  },

  removeListItem(qid, index) {
    if (!Array.isArray(this.answers[qid])) return;
    this.answers[qid].splice(index, 1);
    this.rerenderList(qid);
  },

  updateListItem(qid, index, field, value) {
    if (!Array.isArray(this.answers[qid])) return;
    if (!this.answers[qid][index]) this.answers[qid][index] = {};
    this.answers[qid][index][field] = value;
  },

  rerenderList(qid) {
    const listEl = document.getElementById(`list_${qid}`);
    if (!listEl) return;
    const items = this.answers[qid] || [];
    // 找到question配置
    const sections = this.getVisibleSections();
    for (const section of sections) {
      const q = section.questions.find(qq => qq.id === qid);
      if (q) {
        listEl.innerHTML = items.map((item, i) => this.renderListItem(q, item, i)).join('');
        break;
      }
    }
  },

  nextStep() {
    if (!this.validateCurrentStep()) return;
    this.currentStep++;
    App.renderSurvey();
  },

  prevStep() {
    this.currentStep = Math.max(0, this.currentStep - 1);
    App.renderSurvey();
  },

  finish() {
    if (!this.validateCurrentStep()) return;
    App.processSurveyResult(this.answers);
  },

  validateCurrentStep() {
    const sections = this.getVisibleSections();
    const section = sections[this.currentStep];
    const visibleQuestions = this.getVisibleQuestions(section);
    let isValid = true;
    let firstError = null;

    for (const q of visibleQuestions) {
      // 只验证当前可见的必填题目
      if (q.required && this.evaluateCondition(q.showIf)) {
        const val = this.answers[q.id];
        if (val === undefined || val === '' || val === null) {
          isValid = false;
          const el = document.querySelector('[data-qid="' + q.id + '"]');
          if (el) {
            el.classList.add('error');
            if (!firstError) firstError = el;
          }
        }
      }
      // 动态列表必填校验
      if (q.type === 'dynamic_list' && q.required && this.evaluateCondition(q.showIf)) {
        const items = this.answers[q.id];
        if (!items || items.length === 0) {
          isValid = false;
          const el = document.querySelector('[data-qid="' + q.id + '"]');
          if (el) el.classList.add('error');
        }
      }
    }

    if (!isValid && firstError) {
      firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
      App.showToast('请填写所有必填项');
    }

    return isValid;
  },

  reset() {
    this.currentStep = 0;
    this.answers = {};
  }
};


/**
 * calculator.js - 个税计算器
 * 综合所得应纳税额计算 + 年终奖计税对比
 */

const Calculator = {
  annualRates: null,
  monthlyRates: null,

  async init() {
    this.annualRates = TaxData.taxRates;
    this.monthlyRates = TaxData.monthlyTaxRates;
  },

  /**
   * 查找年度税率档位
   */
  findAnnualBracket(taxableIncome) {
    for (const bracket of this.annualRates) {
      if (bracket.max === null || taxableIncome <= bracket.max) {
        return bracket;
      }
    }
    return this.annualRates[this.annualRates.length - 1];
  },

  /**
   * 查找月度税率档位（年终奖单独计税用）
   */
  findMonthlyBracket(monthlyAmount) {
    for (const bracket of this.monthlyRates) {
      if (bracket.max === null || monthlyAmount <= bracket.max) {
        return bracket;
      }
    }
    return this.monthlyRates[this.monthlyRates.length - 1];
  },

  /**
   * 综合所得应纳税额计算
   * @param {number} income - 年度综合所得
   * @param {number} socialInsurance - 三险一金
   * @param {number} specialDeduction - 专项附加扣除总额
   * @param {number} otherDeduction - 其他扣除（如年金、商业健康险等）
   * @returns {object} 计算结果
   */
  calculateIncomeTax(income, socialInsurance = 0, specialDeduction = 0, otherDeduction = 0) {
    const basicDeduction = 60000;
    const totalDeduction = basicDeduction + socialInsurance + specialDeduction + otherDeduction;
    const taxableIncome = Math.max(0, income - totalDeduction);
    const bracket = this.findAnnualBracket(taxableIncome);
    const taxPayable = Math.max(0, taxableIncome * bracket.rate - bracket.quickDeduction);
    const effectiveRate = income > 0 ? taxPayable / income : 0;

    return {
      income,
      basicDeduction,
      socialInsurance,
      specialDeduction,
      otherDeduction,
      totalDeduction,
      taxableIncome,
      taxRate: bracket.rate,
      quickDeduction: bracket.quickDeduction,
      taxPayable: Math.round(taxPayable),
      effectiveRate: (effectiveRate * 100).toFixed(2) + '%',
      bracketLabel: bracket.label
    };
  },

  /**
   * 年终奖单独计税
   * @param {number} bonus - 年终奖金额
   * @returns {object}
   */
  calculateBonusSeparate(bonus) {
    if (!bonus || bonus <= 0) return { bonus, monthlyAvg: 0, taxRate: 0, quickDeduction: 0, tax: 0 };
    const monthlyAvg = bonus / 12;
    const bracket = this.findMonthlyBracket(monthlyAvg);
    const tax = Math.max(0, bonus * bracket.rate - bracket.quickDeduction);
    return {
      bonus,
      monthlyAvg,
      taxRate: bracket.rate,
      quickDeduction: bracket.quickDeduction,
      tax: Math.round(tax),
      bracketLabel: bracket.label
    };
  },

  /**
   * 年终奖合并计税（并入综合所得）
   * @param {number} income - 年度综合所得（不含年终奖）
   * @param {number} bonus - 年终奖
   * @param {number} socialInsurance - 三险一金
   * @param {number} specialDeduction - 专项附加扣除
   * @returns {object}
   */
  calculateBonusMerged(income, bonus, socialInsurance = 0, specialDeduction = 0, otherDeduction = 0) {
    const totalIncome = income + bonus;
    const result = this.calculateIncomeTax(totalIncome, socialInsurance, specialDeduction, otherDeduction);
    return {
      totalIncome,
      taxableIncome: result.taxableIncome,
      taxRate: result.taxRate,
      quickDeduction: result.quickDeduction,
      tax: result.taxPayable,
      bracketLabel: result.bracketLabel
    };
  },

  /**
   * 年终奖计税对比（核心功能）
   * 分别计算单独计税和合并计税，输出对比结果和推荐方案
   * @param {number} income - 年度综合所得（不含年终奖）
   * @param {number} bonus - 年终奖
   * @param {number} socialInsurance - 三险一金
   * @param {number} specialDeduction - 专项附加扣除
   * @param {number} otherDeduction - 其他扣除
   * @returns {object} 对比结果
   */
  compareBonusTax(income, bonus, socialInsurance = 0, specialDeduction = 0, otherDeduction = 0) {
    if (!bonus || bonus <= 0) {
      return {
        hasBonus: false,
        separate: null,
        merged: null,
        recommend: null,
        saving: 0,
        trapWarning: null
      };
    }

    // 方案A：单独计税
    const incomeTaxSeparate = this.calculateIncomeTax(income, socialInsurance, specialDeduction, otherDeduction);
    const bonusTaxSeparate = this.calculateBonusSeparate(bonus);
    const totalTaxSeparate = incomeTaxSeparate.taxPayable + bonusTaxSeparate.tax;

    // 方案B：合并计税
    const mergedResult = this.calculateBonusMerged(income, bonus, socialInsurance, specialDeduction, otherDeduction);
    const totalTaxMerged = mergedResult.tax;

    // 推荐方案（税额更低者）
    const recommendSeparate = totalTaxSeparate <= totalTaxMerged;
    const saving = Math.abs(totalTaxSeparate - totalTaxMerged);

    // 临界点陷阱检测
    const trapWarning = this.checkBonusTrap(bonus);

    return {
      hasBonus: true,
      separate: {
        label: '单独计税',
        incomeTax: incomeTaxSeparate.taxPayable,
        bonusTax: bonusTaxSeparate.tax,
        totalTax: totalTaxSeparate,
        bonusMonthlyAvg: bonusTaxSeparate.monthlyAvg,
        bonusTaxRate: bonusTaxSeparate.taxRate,
        bonusQuickDeduction: bonusTaxSeparate.quickDeduction,
        bracketLabel: bonusTaxSeparate.bracketLabel,
        detail: incomeTaxSeparate
      },
      merged: {
        label: '合并计税',
        totalTax: totalTaxMerged,
        totalIncome: mergedResult.totalIncome,
        taxableIncome: mergedResult.taxableIncome,
        taxRate: mergedResult.taxRate,
        quickDeduction: mergedResult.quickDeduction,
        bracketLabel: mergedResult.bracketLabel,
        detail: mergedResult
      },
      recommend: recommendSeparate ? 'separate' : 'merged',
      recommendLabel: recommendSeparate ? '单独计税' : '合并计税',
      saving: Math.round(saving),
      trapWarning,
      // 综合分析
      analysis: this.generateBonusAnalysis(income, bonus, socialInsurance, specialDeduction, recommendSeparate, saving)
    };
  },

  /**
   * 临界点陷阱检测
   * 检测年终奖是否处于税率跳档临界点附近（多发1元导致税额跳增）
   */
  checkBonusTrap(bonus) {
    const traps = [
      { threshold: 36000,  nextTier: 144000, label: '36,000' },
      { threshold: 144000, nextTier: 300000, label: '144,000' },
      { threshold: 300000, nextTier: 420000, label: '300,000' },
      { threshold: 420000, nextTier: 660000, label: '420,000' },
      { threshold: 660000, nextTier: 960000, label: '660,000' },
      { threshold: 960000, nextTier: null,    label: '960,000' }
    ];

    for (const trap of traps) {
      // 奖金刚好超过临界点（1元以内）即触发陷阱
      if (bonus > trap.threshold && bonus <= trap.threshold + 1000) {
        const prevBracket = this.findMonthlyBracket(trap.threshold / 12);
        const currentBracket = this.findMonthlyBracket(bonus / 12);
        const taxAtThreshold = trap.threshold * prevBracket.rate - prevBracket.quickDeduction;
        const taxAtBonus = bonus * currentBracket.rate - currentBracket.quickDeduction;
        const taxDiff = taxAtBonus - taxAtThreshold;
        const extraIncome = bonus - trap.threshold;

        if (taxDiff > extraIncome) {
          return {
            isTrap: true,
            threshold: trap.threshold,
            label: trap.label,
            message: `年终奖${this.formatMoney(bonus)}刚好超过临界点${trap.label}元，多发${extraIncome}元却多交税${Math.round(taxDiff)}元，实际到手反而减少${Math.round(taxDiff - extraIncome)}元！`,
            suggestion: `建议与单位协商调整年终奖为${this.formatMoney(trap.threshold)}元（临界点以下），可多到手${Math.round(taxDiff - extraIncome)}元。`
          };
        }
      }
    }
    return { isTrap: false };
  },

  /**
   * 生成年终奖分析建议
   */
  generateBonusAnalysis(income, bonus, socialInsurance, specialDeduction, recommendSeparate, saving) {
    const analyses = [];

    if (recommendSeparate) {
      analyses.push('单独计税更优：年终奖独立算税，不拉高综合所得税率档位。');
      if (income - 60000 - socialInsurance - specialDeduction > 0) {
        analyses.push('您的综合所得已使用基本减除和专项附加扣除，年终奖单独计税可避免税率跳档。');
      }
    } else {
      analyses.push('合并计税更优：年终奖并入综合所得后，充分利用了基本减除费用和专项附加扣除额度。');
      if (income < 60000) {
        analyses.push('您的综合所得低于6万元起征点，合并计税可让年终奖享受未用完的减除额度。');
      }
      if (specialDeduction > 0) {
        analyses.push('您有较多专项附加扣除项，合并计税使年终奖也享受到了扣除红利。');
      }
    }

    if (saving > 0) {
      analyses.push(`选择${recommendSeparate ? '单独计税' : '合并计税'}可节税${this.formatMoney(saving)}。`);
    }

    analyses.push('您可以在个税APP「工资薪金」→「奖金计税方式选择」中自由切换两种方式试算对比，以提交申报时的选择为准。');

    return analyses;
  },

  /**
   * 计算退税/补税额
   * @param {number} taxPayable - 应纳税额
   * @param {number} prepaidTax - 已预缴税额
   * @returns {object}
   */
  calculateRefund(taxPayable, prepaidTax) {
    const diff = prepaidTax - taxPayable;
    return {
      isRefund: diff > 0,
      amount: Math.abs(Math.round(diff)),
      label: diff > 0 ? '退税' : (diff < 0 ? '补税' : '无需退补'),
      prepaidTax,
      taxPayable
    };
  },

  /**
   * 金额格式化
   */
  formatMoney(amount) {
    if (!amount) return '0';
    return amount.toLocaleString('zh-CN', { maximumFractionDigits: 2 }) + '元';
  }
};


/**
 * rules-engine.js - 规则匹配引擎
 * 输入用户画像 → 输出匹配的7项扣除建议
 */

const RulesEngine = {
  deductionsData: null,

  async init() {
    this.deductionsData = TaxData.deductions;
  },

  /**
   * 主匹配函数：根据用户画像匹配所有扣除项
   * @param {object} profile - 用户画像（问卷采集结果）
   * @returns {array} 匹配的扣除项列表
   */
  match(profile) {
    const results = [];
    const calc = this.calculateAge;

    // 1+2. 子女扣除（婴幼儿照护 + 子女教育，每个孩子只匹配一项）
    const childResults = this.matchChildDeductions(profile);
    childResults.forEach(r => results.push(r));

    // 3. 赡养老人
    const elderlyResult = this.matchElderlyCare(profile);
    if (elderlyResult) results.push(elderlyResult);

    // 4. 住房贷款利息
    const loanResult = this.matchHousingLoan(profile);
    if (loanResult) results.push(loanResult);

    // 5. 住房租金
    const rentResult = this.matchHousingRent(profile);
    if (rentResult) results.push(rentResult);

    // 6. 继续教育
    const eduResult = this.matchContinuingEducation(profile);
    if (eduResult) results.push(eduResult);

    // 7. 大病医疗
    const medicalResult = this.matchMedicalExpense(profile);
    if (medicalResult) results.push(medicalResult);

    // 计算总额 - 使用 yourMonthlyShare/yourAnnualShare（您方实际可享份额，已含分配比例）
    const totalMonthly = results.reduce((sum, r) => sum + (r.yourMonthlyShare !== undefined ? r.yourMonthlyShare : r.monthlyAmount || 0), 0);
    const totalAnnual = results.reduce((sum, r) => sum + (r.yourAnnualShare !== undefined ? r.yourAnnualShare : r.annualAmount || 0), 0);

    return {
      deductions: results,
      totalMonthly,
      totalAnnual,
      eligibleCount: results.length
    };
  },

  /**
   * 计算年龄（基于出生日期）
   */
  calculateAge(birthDate) {
    if (!birthDate) return 0;
    const today = new Date();
    const birth = new Date(birthDate);
    let age = today.getFullYear() - birth.getFullYear();
    const m = today.getMonth() - birth.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
    return age;
  },

  /**
   * 判断子女是否满3岁
   */
  isUnder3(birthDate) {
    return this.calculateAge(birthDate) < 3;
  },

  /**
   * 判断子女是否在全日制学历教育阶段
   */
  isInEducation(stage) {
    const eduStages = ['幼儿园', '小学', '初中', '高中', '大学专科', '大学本科', '硕士', '博士'];
    return eduStages.includes(stage);
  },

  // ===== 7项扣除匹配逻辑 =====

  /**
   * 统一匹配子女相关扣除（婴幼儿照护 + 子女教育）
   * 核心规则：每个孩子只匹配一项，3岁以下→婴幼儿照护，3岁以上且在校→子女教育
   * @returns {array} 返回数组（可能包含婴幼儿照护和/或子女教育两项）
   */
  matchChildDeductions(profile) {
    const children = profile.children_list || [];
    const allocation = profile.spouse_allocation || '100';
    const results = [];

    const eduStages = ['幼儿园', '小学', '初中', '高中', '大学专科', '大学本科', '硕士', '博士'];

    // 为每个孩子分类
    const infants = [];   // 3岁以下 → 婴幼儿照护
    const eduKids = [];   // 在校教育 → 子女教育（含3岁以上未入学的学前教育）

    children.forEach(child => {
      if (!child) return;

      // 优先看教育阶段判断
      const stage = child.education_stage;

      // 已毕业的不匹配任何扣除
      if (stage === '已毕业') return;

      // 3岁以下：未入学（3岁以下）
      if (stage === '未入学（3岁以下）') {
        infants.push(child);
        return;
      }

      // 在校教育阶段
      if (eduStages.includes(stage)) {
        eduKids.push(child);
        return;
      }

      // 未入学（3岁以上）→ 归入子女教育的学前教育阶段
      if (stage === '未入学（3岁以上）') {
        eduKids.push(child);
        return;
      }

      // 如果教育阶段为空，用出生日期兜底判断
      if (child.birth_date) {
        if (this.isUnder3(child.birth_date)) {
          infants.push(child);
        } else {
          // 3岁以上但教育阶段未知，归入子女教育
          eduKids.push(child);
        }
      }
    });

    // 构建婴幼儿照护扣除项
    if (infants.length > 0) {
      const monthlyPerChild = 2000;
      const monthlyAmount = infants.length * monthlyPerChild;

      results.push({
        id: 'infant_care',
        title: '3岁以下婴幼儿照护',
        eligible: true,
        childCount: infants.length,
        monthlyAmount,
        annualAmount: monthlyAmount * 12,
        allocationMethod: allocation === '100'
          ? '您全额扣除（100%）'
          : '双方各扣50%（您方每月' + (monthlyAmount * 0.5) + '元）',
        yourMonthlyShare: allocation === '100' ? monthlyAmount : monthlyAmount * 0.5,
        yourAnnualShare: allocation === '100' ? monthlyAmount * 12 : monthlyAmount * 0.5 * 12,
        conditions: `${infants.length}名3岁以下子女`,
        documents: ['子女出生医学证明', '子女人口信息'],
        appPath: '专项附加扣除填报 → 3岁以下婴幼儿照护',
        tips: [
          '扣除比例为出生当月至年满3周岁前一月',
          '子女满3周岁后应转为子女教育扣除',
          '一个纳税年度内扣除方式不可变更'
        ]
      });
    }

    // 构建子女教育扣除项
    if (eduKids.length > 0) {
      const monthlyPerChild = 2000;
      const monthlyAmount = eduKids.length * monthlyPerChild;

      results.push({
        id: 'child_education',
        title: '子女教育',
        eligible: true,
        childCount: eduKids.length,
        monthlyAmount,
        annualAmount: monthlyAmount * 12,
        allocationMethod: allocation === '100'
          ? '您全额扣除（100%）'
          : '双方各扣50%（您方每月' + (monthlyAmount * 0.5) + '元）',
        yourMonthlyShare: allocation === '100' ? monthlyAmount : monthlyAmount * 0.5,
        yourAnnualShare: allocation === '100' ? monthlyAmount * 12 : monthlyAmount * 0.5 * 12,
        conditions: `${eduKids.length}名子女接受学历教育（含学前教育）`,
        documents: ['子女学籍信息', '子女身份证号'],
        appPath: '专项附加扣除填报 → 子女教育',
        tips: [
          '扣除期间为入学当月至教育结束当月',
          '子女毕业后需及时修改教育终止时间',
          '同一子女扣除比例夫妻合计不得超过100%'
        ]
      });
    }

    return results;
  },

  matchElderlyCare(profile) {
    if (!profile.parents_over60) {
      return this.buildNotEligible('elderly_care', '赡养老人', '父母未满60周岁');
    }

    if (profile.is_only_child) {
      return {
        id: 'elderly_care',
        title: '赡养老人',
        eligible: true,
        monthlyAmount: 3000,
        annualAmount: 36000,
        allocationMethod: '独生子女全额扣除',
        yourMonthlyShare: 3000,
        yourAnnualShare: 36000,
        conditions: '独生子女，父母年满60周岁',
        documents: ['被赡养人身份证信息'],
        appPath: '专项附加扣除填报 → 赡养老人',
        tips: [
          '独生子女每月扣除3000元',
          '被赡养人仅限本人父母或子女均已去世的祖父母/外祖父母',
          '岳父母/公婆不符合条件'
        ]
      };
    }

    // 非独生子女 - 根据分摊方式计算
    const allocMethod = profile.elderly_allocation_method || 'average';
    const siblingCount = parseInt(profile.sibling_count) || 2;
    let monthlyAmount, allocationText;

    if (allocMethod === 'average') {
      // 平均分摊
      const perPerson = Math.min(1500, Math.round(3000 / siblingCount));
      monthlyAmount = perPerson;
      allocationText = `平均分摊（${siblingCount}人，您每月${perPerson}元）`;
    } else {
      // 约定分摊或指定分摊 - 按用户输入的比例
      const shareRatio = (profile.my_share_ratio || 50) / 100;
      monthlyAmount = Math.min(1500, Math.round(3000 * shareRatio));
      const methodLabel = allocMethod === 'agreed' ? '约定分摊' : '指定分摊';
      allocationText = `${methodLabel}（您分摊${profile.my_share_ratio || 50}%，每月${monthlyAmount}元）`;
    }

    return {
      id: 'elderly_care',
      title: '赡养老人',
      eligible: true,
      monthlyAmount,
      annualAmount: monthlyAmount * 12,
      allocationMethod: allocationText,
      yourMonthlyShare: monthlyAmount,
      yourAnnualShare: monthlyAmount * 12,
      conditions: '非独生子女，父母年满60周岁',
      documents: ['被赡养人身份证信息', '书面分摊协议'],
      appPath: '专项附加扣除填报 → 赡养老人',
      tips: [
        '非独生子女每人每月扣除不超过1500元',
        '兄弟姐妹合计不超过3000元/月',
        '约定分摊和指定分摊需签订书面分摊协议',
        '被赡养人指定优先于约定分摊'
      ]
    };
  },

  matchHousingLoan(profile) {
    if (!profile.has_loan || !profile.is_first_loan || profile.previously_claimed_loan) {
      const reason = !profile.has_loan ? '无住房贷款'
        : !profile.is_first_loan ? '非首套住房贷款'
        : '已享受过房贷利息扣除（一生仅一次）';
      return this.buildNotEligible('housing_loan', '住房贷款利息', reason);
    }

    const allocation = profile.loan_allocation || '100';
    const fullMonthly = 1000;
    const monthlyAmount = allocation === '0' ? 0 : allocation === '50' ? 500 : fullMonthly;
    const allocationText = allocation === '0'
      ? '配偶全额扣除（您方不扣除）'
      : allocation === '50'
        ? '夫妻各扣50%（您方每月500元）'
        : '我方全额扣除（1000元/月）';

    return {
      id: 'housing_loan',
      title: '住房贷款利息',
      eligible: true,
      monthlyAmount,
      annualAmount: monthlyAmount * 12,
      allocationMethod: allocationText,
      yourMonthlyShare: monthlyAmount,
      yourAnnualShare: monthlyAmount * 12,
      conditions: '首套住房贷款，还款期内',
      documents: ['住房贷款合同', '贷款还款支出凭证'],
      appPath: '专项附加扣除填报 → 住房贷款利息',
      tips: [
        '每月扣除1000元（或夫妻各500元），最长240个月',
        '夫妻仅一方可扣除，或双方各扣50%',
        '一生只能享受一次首套房贷利息扣除',
        '与住房租金不可同时享受'
      ]
    };
  },

  matchHousingRent(profile) {
    if (profile.has_own_house) {
      return this.buildNotEligible('housing_rent', '住房租金', '在主要工作城市有自有住房');
    }
    if (!profile.has_rent) {
      return this.buildNotEligible('housing_rent', '住房租金', '未发生租房支出');
    }
    if (profile.spouse_has_house_in_work_city) {
      return this.buildNotEligible('housing_rent', '住房租金', '配偶在您工作城市有自有住房，视同您有住房');
    }

    // 根据城市确定租金标准
    const amount = this.getRentAmount(profile.rent_city || profile.work_city);

    return {
      id: 'housing_rent',
      title: '住房租金',
      eligible: true,
      monthlyAmount: amount,
      annualAmount: amount * 12,
      allocationMethod: '夫妻一方扣除',
      yourMonthlyShare: amount,
      yourAnnualShare: amount * 12,
      conditions: `主要工作城市租房，租金标准${amount}元/月`,
      documents: ['住房租赁合同', '出租方信息'],
      appPath: '专项附加扣除填报 → 住房租金',
      tips: [
        `租金按城市分档：1500/1100/800元每月`,
        '夫妻同城市仅一方可扣除',
        '与住房贷款利息不可同时享受',
        '租金扣除城市应与主要工作城市一致'
      ]
    };
  },

  getRentAmount(city) {
    if (TaxData.cities.tier1.includes(city)) return 1500;
    if (TaxData.cities.tier2.includes(city)) return 1100;
    return 800;
  },

  matchContinuingEducation(profile) {
    const results = [];

    // 学历继续教育
    if (profile.has_degree_education) {
      const months = Math.min(profile.education_months_total || 12, 12);
      const monthlyAmount = 400;
      results.push({
        id: 'continuing_education_degree',
        title: '继续教育（学历）',
        eligible: true,
        monthlyAmount: monthlyAmount * months / 12,
        annualAmount: monthlyAmount * months,
        allocationMethod: '本人扣除',
        yourMonthlyShare: monthlyAmount,
        yourAnnualShare: monthlyAmount * months,
        conditions: '学历（学位）继续教育在读',
        documents: ['学历学籍信息'],
        appPath: '专项附加扣除填报 → 继续教育',
        tips: [
          '每月400元，最长48个月',
          '仅限中国境内接受的学历教育',
          '不同学历阶段可分别计算48个月'
        ]
      });
    }

    // 职业资格继续教育
    if (profile.has_vocational_cert && profile.cert_in_directory) {
      results.push({
        id: 'continuing_education_cert',
        title: '继续教育（职业资格）',
        eligible: true,
        monthlyAmount: 0,
        annualAmount: 3600,
        allocationMethod: '本人扣除',
        yourMonthlyShare: 0,
        yourAnnualShare: 3600,
        conditions: '本年度取得国家职业资格目录内证书',
        documents: ['职业资格证书信息'],
        appPath: '专项附加扣除填报 → 继续教育',
        tips: [
          '取得证书当年一次性扣除3600元',
          '仅限《国家职业资格目录》内证书',
          '后续年度培训、年审不可扣除',
          '国外证书不符合条件'
        ]
      });
    }

    if (results.length === 0) {
      return this.buildNotEligible('continuing_education', '继续教育', '未在读学历教育或未取得职业资格证书');
    }

    // 合并多个继续教育子项
    return results.length === 1 ? results[0] : {
      id: 'continuing_education',
      title: '继续教育',
      eligible: true,
      subItems: results,
      monthlyAmount: results.reduce((s, r) => s + (r.monthlyAmount || 0), 0),
      annualAmount: results.reduce((s, r) => s + (r.annualAmount || 0), 0),
      allocationMethod: '本人扣除',
      yourAnnualShare: results.reduce((s, r) => s + (r.yourAnnualShare || 0), 0)
    };
  },

  matchMedicalExpense(profile) {
    if (!profile.has_large_medical_expense || !profile.medical_self_paid) {
      return this.buildNotEligible('medical_expense', '大病医疗', '无大病医疗支出或自付金额未超15000元');
    }

    const selfPaid = profile.medical_self_paid || 0;
    const childrenPaid = profile.children_medical_self_paid || 0;
    const totalPaid = selfPaid + childrenPaid;
    const threshold = 15000;

    if (totalPaid <= threshold) {
      return this.buildNotEligible('medical_expense', '大病医疗', `自付金额${totalPaid}元未超15000元起扣线`);
    }

    const deductible = Math.min(totalPaid - threshold, 80000);

    return {
      id: 'medical_expense',
      title: '大病医疗',
      eligible: true,
      monthlyAmount: 0,
      annualAmount: deductible,
      allocationMethod: profile.medical_deduction_by === 'self' ? '本人扣除' : profile.medical_deduction_by === 'spouse' ? '配偶扣除' : '父母一方扣除',
      yourAnnualShare: profile.medical_deduction_by === 'self' ? deductible : 0,
      conditions: `医保目录内自付${totalPaid}元，超起扣线${totalPaid - threshold}元`,
      documents: ['医疗服务收费票据', '医保结算单'],
      appPath: '汇算清缴 → 大病医疗专项附加扣除',
      tips: [
        '仅扣除医保目录内自付超15000元的部分',
        '年度限额80000元',
        '可通过"国家医保服务平台"APP查询准确金额',
        '本人、配偶、未成年子女分别计算'
      ]
    };
  },

  buildNotEligible(id, title, reason) {
    return {
      id,
      title,
      eligible: false,
      reason,
      monthlyAmount: 0,
      annualAmount: 0
    };
  }
};


/**
 * error-checker.js - 易错点检测器
 * 基于用户画像自动检测14类常见填报错误
 */

const ErrorChecker = {
  rules: null,

  async init() {
    this.rules = TaxData.errorRules;
  },

  /**
   * 检测所有易错点
   * @param {object} profile - 用户画像
   * @returns {array} 触发的错误/警告列表
   */
  check(profile) {
    const triggered = [];

    // 逐条检查
    const checks = [
      this.check01_nonOnlyChildOverLimit(profile),
      this.check02_allocationOver100(profile),
      this.check03_educationNotTerminated(profile),
      this.check04_loanAndRentBoth(profile),
      this.check05_includeInLaws(profile),
      this.check06_certNotInDirectory(profile),
      this.check07_duplicateLoanClaim(profile),
      this.check08_medicalOutOfCatalog(profile),
      this.check09_educationOver48Months(profile),
      this.check10_rentCityMismatch(profile),
      this.check11_infantNotSwitched(profile),
      this.check12_spouseBothClaimLoan(profile),
      this.check13_noWrittenAgreement(profile),
      this.check14_hobbyCert(profile)
    ];

    for (const check of checks) {
      if (check && check.triggered) {
        // 从规则定义中补全 category 字段
        const ruleDef = this.rules.find(r => r.id === check.id);
        if (ruleDef && !check.category) {
          check.category = ruleDef.category;
        }
        if (!check.category) check.category = '其他';
        triggered.push(check);
      }
    }

    return {
      errors: triggered.filter(t => t.severity === 'error'),
      warnings: triggered.filter(t => t.severity === 'warning'),
      all: triggered,
      hasIssues: triggered.length > 0
    };
  },

  // err_01: 非独生子女赡养老人超限
  check01_nonOnlyChildOverLimit(profile) {
    if (!profile.parents_over60 || profile.is_only_child) return null;
    const shareRatio = (profile.my_share_ratio || 50) / 100;
    const monthlyAmount = Math.round(3000 * shareRatio);
    if (monthlyAmount > 1500) {
      return {
        id: 'err_01',
        triggered: true,
        severity: 'error',
        title: '非独生子女赡养老人超限',
        message: `非独生子女每月赡养老人扣除不得超过1500元，您当前分摊${profile.my_share_ratio || 50}%（${monthlyAmount}元/月）已超标。`,
        solution: '与兄弟姐妹协商调整分摊比例，每人每月不超过1500元，并签订书面分摊协议。'
      };
    }
    return null;
  },

  // err_02: 夫妻扣除比例合计超100%
  check02_allocationOver100(profile) {
    if (!profile.has_children || !profile.has_spouse) return null;
    const allocation = parseInt(profile.spouse_allocation) || 100;
    // 此处简化检测，实际需用户确认配偶选择
    if (allocation > 100) {
      return {
        id: 'err_02',
        triggered: true,
        severity: 'error',
        title: '夫妻扣除比例合计超100%',
        message: '夫妻对同一子女的扣除比例合计不能超过100%。',
        solution: '确认夫妻双方扣除比例合计为100%（一方100%或双方各50%）。'
      };
    }
    return null;
  },

  // err_03: 子女教育终止未更新
  check03_educationNotTerminated(profile) {
    if (!profile.has_children) return null;
    const children = profile.children_list || [];
    const graduated = children.find(c => c.education_stage === '已毕业');
    if (graduated) {
      return {
        id: 'err_03',
        triggered: true,
        severity: 'warning',
        title: '子女教育终止未更新',
        message: '子女已毕业，应在个税APP中录入教育终止时间（毕业当月），不可继续享受子女教育扣除。',
        solution: '在个税APP中修改子女教育扣除的终止月份为毕业当月。'
      };
    }
    return null;
  },

  // err_04: 房贷与租金同时扣除
  check04_loanAndRentBoth(profile) {
    if (profile.has_loan && profile.has_rent && !profile.has_own_house === false) {
      // 如果有自有住房且有贷款，同时又填了租金（不太常见但检查）
      return {
        id: 'err_04',
        triggered: true,
        severity: 'error',
        title: '房贷与租金同时扣除',
        message: '住房贷款利息与住房租金不可同时享受，请二选一。',
        solution: '根据实际情况选择更优惠的一项：有首套房贷选房贷利息（1000元/月），无自有住房选租金（800-1500元/月）。'
      };
    }
    return null;
  },

  // err_05: 赡养对象填写错误
  check05_includeInLaws(profile) {
    if (!profile.parents_over60 || !profile.include_in_laws) return null;
    return {
      id: 'err_05',
      triggered: true,
      severity: 'error',
      title: '赡养对象填写错误',
      message: '被赡养人仅限本人年满60周岁的父母，岳父母/公婆不符合条件。',
      solution: '删除岳父母/公婆信息，仅填报本人父母。配偶的父母由配偶自行填报。'
    };
  },

  // err_06: 非国家认可证书
  check06_certNotInDirectory(profile) {
    if (!profile.has_vocational_cert || profile.cert_in_directory) return null;
    return {
      id: 'err_06',
      triggered: true,
      severity: 'error',
      title: '非国家认可证书',
      message: '仅取得《国家职业资格目录》内证书方可扣除。国外证书、非目录内证书不符合条件。',
      solution: '通过"国务院客户端"小程序搜索"国家职业资格目录"查询您的证书是否在列。'
    };
  },

  // err_07: 首套房贷重复扣除
  check07_duplicateLoanClaim(profile) {
    if (!profile.has_loan || !profile.previously_claimed_loan) return null;
    return {
      id: 'err_07',
      triggered: true,
      severity: 'error',
      title: '首套房贷重复扣除',
      message: '纳税人一生只能享受一次首套住房贷款利息扣除。已享受过房贷利息扣除的，不得再次填报。',
      solution: '如之前已申报过房贷利息扣除，即使卖房后再次购房也不可重复享受。'
    };
  },

  // err_08: 大病医疗含目录外费用
  check08_medicalOutOfCatalog(profile) {
    if (!profile.has_large_medical_expense) return null;
    // 此处提醒用户确认金额来源
    return {
      id: 'err_08',
      triggered: true,
      severity: 'warning',
      title: '请确认大病医疗金额来源',
      message: '大病医疗仅扣除医保目录范围内的自付部分。请确保填写的金额来自"国家医保服务平台"APP查询结果，而非医疗费用总金额。',
      solution: '下载"国家医保服务平台"APP，首页→年度费用汇总查询，获取医保目录内自付金额。'
    };
  },

  // err_09: 学历继续教育超48个月
  check09_educationOver48Months(profile) {
    if (!profile.has_degree_education) return null;
    // 由于问卷只收集当年月数，这里给出提醒
    return {
      id: 'err_09',
      triggered: true,
      severity: 'warning',
      title: '注意学历继续教育扣除期限',
      message: '学历继续教育扣除期限最长48个月。如您的学历教育已超过48个月，超期部分不可继续扣除。',
      solution: '确认入学至当前的实际月数，如超48个月需在个税APP中调整扣除终止月份。不同学历阶段可分别计算。'
    };
  },

  // err_10: 租金扣除城市与工作城市不符
  check10_rentCityMismatch(profile) {
    if (!profile.has_rent || !profile.rent_city || !profile.work_city) return null;
    if (profile.rent_city !== profile.work_city) {
      return {
        id: 'err_10',
        triggered: true,
        severity: 'warning',
        title: '租金扣除城市与工作城市不符',
        message: `您的主要工作城市为${profile.work_city}，但租金扣除城市为${profile.rent_city}。住房租金应在主要工作城市发生。`,
        solution: '确认租金扣除城市与主要工作城市一致。如异地工作租房，以工作城市为准。'
      };
    }
    return null;
  },

  // err_11: 婴幼儿满3岁未转为子女教育
  check11_infantNotSwitched(profile) {
    if (!profile.has_children) return null;
    const children = profile.children_list || [];
    const today = new Date();
    const turned3 = children.find(c => {
      if (!c.birth_date) return false;
      const birth = new Date(c.birth_date);
      const age = today.getFullYear() - birth.getFullYear();
      const m = today.getMonth() - birth.getMonth();
      const actualAge = m < 0 || (m === 0 && today.getDate() < birth.getDate()) ? age - 1 : age;
      return actualAge >= 3 && (c.education_stage === '未入学（3岁以下）' || c.education_stage === '未入学（3岁以上）');
    });
    if (turned3) {
      return {
        id: 'err_11',
        triggered: true,
        severity: 'warning',
        title: '婴幼儿满3岁未转为子女教育',
        message: '子女年满3周岁后，应从婴幼儿照护转为子女教育扣除。',
        solution: '在个税APP中停止婴幼儿照护扣除，新增子女教育扣除（入园/入学当月起）。'
      };
    }
    return null;
  },

  // err_12: 夫妻同时填报同一房贷
  check12_spouseBothClaimLoan(profile) {
    // 问卷中无法直接获知配偶是否也填报，给出提醒
    if (!profile.has_loan || !profile.is_first_loan) return null;
    return {
      id: 'err_12',
      triggered: true,
      severity: 'warning',
      title: '注意夫妻不可同时填报房贷',
      message: '住房贷款利息仅可由夫妻一方扣除，请确认配偶未在个税APP中重复填报同一套住房的房贷利息。',
      solution: '夫妻协商确定由一方扣除（1000元/月），另一方确认未填报该扣除记录。'
    };
  },

  // err_13: 赡养老人分摊无协议
  check13_noWrittenAgreement(profile) {
    if (!profile.parents_over60 || profile.is_only_child) return null;
    if (!profile.has_written_agreement) {
      return {
        id: 'err_13',
        triggered: true,
        severity: 'warning',
        title: '赡养老人分摊无书面协议',
        message: '非独生子女分摊赡养老人扣除需签订书面分摊协议，且兄弟姐妹分摊比例须一致。',
        solution: '与兄弟姐妹签订书面分摊协议，明确各自分摊比例（每人不超过1500元/月），三方留存备查。'
      };
    }
    return null;
  },

  // err_14: 兴趣爱好证书
  check14_hobbyCert(profile) {
    if (!profile.has_vocational_cert) return null;
    // 如果用户选择了"不确定"证书是否在目录内
    if (profile.cert_in_directory === false) {
      return {
        id: 'err_14',
        triggered: true,
        severity: 'error',
        title: '兴趣爱好类证书不可扣除',
        message: '兴趣爱好类培训证书（如茶艺师、西式面点师、保育员等）不在《国家职业资格目录》内，不可申报继续教育扣除。',
        solution: '仅取得国家职业资格目录内证书（如注册会计师、教师资格证等）的当年方可扣除3600元。'
      };
    }
    return null;
  }
};


/**
 * report.js - 报告生成器
 * 将规则匹配结果+计算结果+易错点检测整合为个性化填报指引报告
 */

const Report = {
  /**
   * 生成完整报告HTML
   * @param {object} matchResult - RulesEngine.match()结果
   * @param {object} bonusResult - Calculator.compareBonusTax()结果
   * @param {object} errorResult - ErrorChecker.check()结果
   * @param {object} profile - 用户画像
   * @returns {string} 报告HTML
   */
  generate(matchResult, bonusResult, errorResult, profile) {
    const income = profile.annual_income || 0;
    const socialInsurance = profile.social_insurance || 0;
    const prepaidTax = profile.prepaid_tax || 0;
    const totalDeduction = matchResult.totalAnnual;

    // 计算其他扣除合计（年金+商业健康险+个人养老金+其他）
    const otherDeduction = this.calculateOtherDeductions(profile);

    // 计算应纳税额（含专项扣除+专项附加扣除+其他扣除）
    const calcResult = Calculator.calculateIncomeTax(income, socialInsurance, totalDeduction, otherDeduction);

    // 计算不填专项附加扣除时的应纳税额（对比）
    const calcWithoutDeduction = Calculator.calculateIncomeTax(income, socialInsurance, 0, otherDeduction);

    // 退税/补税
    const refundResult = Calculator.calculateRefund(calcResult.taxPayable, prepaidTax);

    return `
      <div class="report-container" id="reportContent">
        ${this.renderHeader(profile)}
        ${this.renderSummary(matchResult, calcResult, refundResult, profile, otherDeduction)}
        ${this.renderBonusComparison(bonusResult, profile)}
        ${this.renderDeductionDetails(matchResult)}
        ${this.renderOtherDeductions(profile, otherDeduction)}
        ${this.renderErrorWarnings(errorResult)}
        ${this.renderOperationGuide(matchResult, bonusResult)}
        ${this.renderDisclaimer()}
        ${this.renderExportButtons()}
      </div>
    `;
  },

  // 计算其他扣除总额
  calculateOtherDeductions(profile) {
    let total = 0;
    // 年金：个人缴费不超过工资基数4%，此处取用户填写金额
    if (profile.has_annuity && profile.annuity_amount) total += Number(profile.annuity_amount);
    // 商业健康险：限额2400元/年
    if (profile.has_health_insurance && profile.health_insurance_amount) {
      total += Math.min(2400, Number(profile.health_insurance_amount));
    }
    // 个人养老金：限额12000元/年
    if (profile.has_pension && profile.pension_amount) {
      total += Math.min(12000, Number(profile.pension_amount));
    }
    // 其他扣除项目（用户手动填写）
    if (profile.other_deduct_amount) {
      total += Number(profile.other_deduct_amount);
    }
    // 费用合计（展业成本等，用户手动填写）
    if (profile.expense_total_amount) {
      total += Number(profile.expense_total_amount);
    }
    return total;
  },

  // 渲染其他扣除详情
  renderOtherDeductions(profile, totalAmount) {
    if (totalAmount <= 0) return '';

    const items = [];
    if (profile.has_annuity && profile.annuity_amount) {
      items.push({
        title: '企业年金/职业年金',
        amount: Number(profile.annuity_amount),
        desc: '个人缴费部分，不超过本人缴费工资计税基数4%',
        tip: '通常由单位在预扣预缴时自动扣除，汇算时核对金额即可'
      });
    }
    if (profile.has_health_insurance && profile.health_insurance_amount) {
      items.push({
        title: '商业健康保险',
        amount: Math.min(2400, Number(profile.health_insurance_amount)),
        desc: '限额2400元/年（200元/月）',
        tip: '保单须注明税优识别码方可在个税APP中申报扣除'
      });
    }
    if (profile.has_pension && profile.pension_amount) {
      items.push({
        title: '个人养老金',
        amount: Math.min(12000, Number(profile.pension_amount)),
        desc: '限额12000元/年',
        tip: '可通过个税APP「个人养老金扣除管理」→「一站式申报」自动获取缴费信息'
      });
    }
    if (profile.other_deduct_amount) {
      items.push({
        title: '其他扣除项目',
        amount: Number(profile.other_deduct_amount),
        desc: '税延养老保险、允许扣除的税费、公务用车通讯补贴等',
        tip: '请妥善留存相关凭证备查'
      });
    }
    if (profile.expense_total_amount) {
      items.push({
        title: '费用合计（展业成本等）',
        amount: Number(profile.expense_total_amount),
        desc: '保险营销员/证券经纪人的展业成本（佣金收入×25%），或其他依法可扣除的费用',
        tip: '展业成本按佣金收入25%计算，请自行计算后填入'
      });
    }

    return `
      <div class="report-section">
        <h2 class="report-section-title">其他扣除项目</h2>
        <div class="summary-cards" style="grid-template-columns: 1fr;">
          <div class="summary-card highlight">
            <div class="card-value">${Calculator.formatMoney(totalAmount)}</div>
            <div class="card-label">其他扣除合计</div>
          </div>
        </div>
        ${items.map(item => `
          <div class="deduction-card">
            <div class="deduction-header">
              <h3>${item.title}</h3>
              <span class="amount-badge">${Calculator.formatMoney(item.amount)}/年</span>
            </div>
            <div class="deduction-body">
              <div class="deduction-info">
                <div class="info-row">
                  <span class="info-label">扣除标准</span>
                  <span class="info-value">${item.desc}</span>
                </div>
              </div>
              <div class="deduction-tips">
                <p class="tips-title">操作提示</p>
                <ul><li>${item.tip}</li></ul>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  },

  renderHeader(profile) {
    const date = new Date().toLocaleDateString('zh-CN');
    return `
      <div class="report-header">
        <h1>个人所得税专项附加扣除填报指引</h1>
        <p class="report-date">生成日期：${date}</p>
        <div class="report-meta">
          <span>年度综合所得：${Calculator.formatMoney(profile.annual_income || 0)}</span>
          ${profile.annual_bonus ? `<span>年终奖：${Calculator.formatMoney(profile.annual_bonus)}</span>` : ''}
        </div>
      </div>
    `;
  },

  renderSummary(matchResult, calcResult, refundResult, profile, otherDeduction) {
    const eligibleDeductions = matchResult.deductions.filter(d => d.eligible);
    const socialInsurance = (profile && profile.social_insurance) || 0;
    const otherDeduct = otherDeduction || 0;
    const totalAllDeductions = 60000 + socialInsurance + matchResult.totalAnnual + otherDeduct;

    return `
      <div class="report-section summary-section">
        <h2 class="report-section-title">扣除汇总</h2>
        <div class="summary-cards">
          <div class="summary-card">
            <div class="card-value">${matchResult.eligibleCount}</div>
            <div class="card-label">专项附加扣除项</div>
          </div>
          <div class="summary-card highlight">
            <div class="card-value">${Calculator.formatMoney(totalAllDeductions)}</div>
            <div class="card-label">年度扣除总额</div>
          </div>
          <div class="summary-card ${refundResult.isRefund ? 'positive' : 'negative'}">
            <div class="card-value">${Calculator.formatMoney(refundResult.amount)}</div>
            <div class="card-label">${refundResult.label}</div>
          </div>
        </div>

        <table class="report-table">
          <thead>
            <tr>
              <th>扣除项目</th>
              <th>月度金额</th>
              <th>年度总额</th>
              <th>状态</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>基本减除费用</td>
              <td>5,000元</td>
              <td><strong>60,000元</strong></td>
              <td><span class="status-tag eligible">自动享受</span></td>
            </tr>
            ${socialInsurance > 0 ? `
            <tr>
              <td>专项扣除（三险一金）</td>
              <td>—</td>
              <td><strong>${Calculator.formatMoney(socialInsurance)}</strong></td>
              <td><span class="status-tag eligible">单位代扣</span></td>
            </tr>
            ` : ''}
            ${eligibleDeductions.map(d => `
              <tr>
                <td>${d.title}</td>
                <td>${(d.yourMonthlyShare !== undefined ? d.yourMonthlyShare : d.monthlyAmount) > 0 ? Calculator.formatMoney(d.yourMonthlyShare !== undefined ? d.yourMonthlyShare : d.monthlyAmount) : '—'}</td>
                <td><strong>${Calculator.formatMoney(d.yourAnnualShare !== undefined ? d.yourAnnualShare : d.annualAmount)}</strong></td>
                <td><span class="status-tag eligible">可享受</span></td>
              </tr>
            `).join('')}
            ${otherDeduct > 0 ? `
            <tr>
              <td>其他扣除（年金/健康险/养老金/展业成本等）</td>
              <td>—</td>
              <td><strong>${Calculator.formatMoney(otherDeduct)}</strong></td>
              <td><span class="status-tag eligible">可享受</span></td>
            </tr>
            ` : ''}
            ${matchResult.deductions.filter(d => !d.eligible).map(d => `
              <tr class="not-eligible-row">
                <td>${d.title}</td>
                <td>—</td>
                <td>—</td>
                <td><span class="status-tag not-eligible">不符合</span></td>
              </tr>
            `).join('')}
          </tbody>
          <tfoot>
            <tr>
              <td><strong>合计扣除</strong></td>
              <td></td>
              <td><strong>${Calculator.formatMoney(totalAllDeductions)}</strong></td>
              <td></td>
            </tr>
          </tfoot>
        </table>

        <div class="tax-detail-box">
          <div class="tax-detail-row">
            <span>年度综合所得</span>
            <span>${Calculator.formatMoney(calcResult.income)}</span>
          </div>
          <div class="tax-detail-row">
            <span>减：基本减除费用（6万/年）</span>
            <span>-${Calculator.formatMoney(calcResult.basicDeduction)}</span>
          </div>
          ${socialInsurance > 0 ? `
          <div class="tax-detail-row">
            <span>减：专项扣除（三险一金）</span>
            <span>-${Calculator.formatMoney(socialInsurance)}</span>
          </div>
          ` : ''}
          <div class="tax-detail-row">
            <span>减：专项附加扣除</span>
            <span>-${Calculator.formatMoney(matchResult.totalAnnual)}</span>
          </div>
          ${otherDeduct > 0 ? `
          <div class="tax-detail-row">
            <span>减：其他扣除</span>
            <span>-${Calculator.formatMoney(otherDeduct)}</span>
          </div>
          ` : ''}
          <div class="tax-detail-row total">
            <span>应纳税所得额</span>
            <span>${Calculator.formatMoney(calcResult.taxableIncome)}</span>
          </div>
          <div class="tax-detail-row">
            <span>适用税率</span>
            <span>${(calcResult.taxRate * 100).toFixed(0)}%</span>
          </div>
          <div class="tax-detail-row total">
            <span>应纳税额</span>
            <span class="tax-amount">${Calculator.formatMoney(calcResult.taxPayable)}</span>
          </div>
          <div class="tax-detail-row">
            <span>已预缴税额</span>
            <span>${Calculator.formatMoney(refundResult.prepaidTax)}</span>
          </div>
          <div class="tax-detail-row ${refundResult.isRefund ? 'refund' : 'pay'} total">
            <span>${refundResult.label}</span>
            <span class="${refundResult.isRefund ? 'refund-amount' : 'pay-amount'}">${Calculator.formatMoney(refundResult.amount)}</span>
          </div>
        </div>
      </div>
    `;
  },

  renderBonusComparison(bonusResult, profile) {
    if (!bonusResult.hasBonus) return '';

    const separate = bonusResult.separate;
    const merged = bonusResult.merged;
    const recommendClass = bonusResult.recommend === 'separate' ? 'separate' : 'merged';

    return `
      <div class="report-section bonus-section">
        <h2 class="report-section-title">年终奖计税方案对比</h2>
        <p class="section-desc">您的年终奖 ${Calculator.formatMoney(profile.annual_bonus)} 有两种计税方式，请对比后自行选择：</p>

        <div class="bonus-compare">
          <div class="bonus-card ${recommendClass === 'separate' ? 'recommended' : ''}">
            <div class="bonus-card-header">
              <span class="bonus-label">方案A：单独计税</span>
              ${recommendClass === 'separate' ? '<span class="recommend-badge">推荐</span>' : ''}
            </div>
            <div class="bonus-card-body">
              <div class="bonus-detail-row">
                <span>年终奖税率</span>
                <span>${(separate.bonusTaxRate * 100).toFixed(0)}%</span>
              </div>
              <div class="bonus-detail-row">
                <span>年终奖应纳税</span>
                <span>${Calculator.formatMoney(separate.bonusTax)}</span>
              </div>
              <div class="bonus-detail-row">
                <span>综合所得应纳税</span>
                <span>${Calculator.formatMoney(separate.incomeTax)}</span>
              </div>
              <div class="bonus-detail-row total">
                <span>总税额合计</span>
                <span class="bonus-total">${Calculator.formatMoney(separate.totalTax)}</span>
              </div>
            </div>
          </div>

          <div class="bonus-vs">VS</div>

          <div class="bonus-card ${recommendClass === 'merged' ? 'recommended' : ''}">
            <div class="bonus-card-header">
              <span class="bonus-label">方案B：合并计税</span>
              ${recommendClass === 'merged' ? '<span class="recommend-badge">推荐</span>' : ''}
            </div>
            <div class="bonus-card-body">
              <div class="bonus-detail-row">
                <span>合并后税率</span>
                <span>${(merged.taxRate * 100).toFixed(0)}%</span>
              </div>
              <div class="bonus-detail-row">
                <span>合并后应纳税所得额</span>
                <span>${Calculator.formatMoney(merged.taxableIncome)}</span>
              </div>
              <div class="bonus-detail-row">
                <span>速算扣除数</span>
                <span>${Calculator.formatMoney(merged.quickDeduction)}</span>
              </div>
              <div class="bonus-detail-row total">
                <span>总税额合计</span>
                <span class="bonus-total">${Calculator.formatMoney(merged.totalTax)}</span>
              </div>
            </div>
          </div>
        </div>

        ${bonusResult.saving > 0 ? `
          <div class="bonus-savings">
            <span>选择「${bonusResult.recommendLabel}」可节税</span>
            <strong>${Calculator.formatMoney(bonusResult.saving)}</strong>
          </div>
        ` : `
          <div class="bonus-savings neutral">
            <span>两种方案税额相同，可根据自身情况选择</span>
          </div>
        `}

        ${bonusResult.trapWarning && bonusResult.trapWarning.isTrap ? `
          <div class="trap-warning">
            <div class="trap-icon">⚠️</div>
            <div class="trap-content">
              <strong>临界点陷阱提醒</strong>
              <p>${bonusResult.trapWarning.message}</p>
              <p class="trap-suggestion">${bonusResult.trapWarning.suggestion}</p>
            </div>
          </div>
        ` : ''}

        <div class="bonus-analysis">
          ${bonusResult.analysis.map(a => `<p>· ${a}</p>`).join('')}
        </div>

        <div class="bonus-operation">
          <p class="operation-label">操作路径：</p>
          <p>个税APP → 工资薪金 → 奖金计税方式选择 → 选择「${bonusResult.recommendLabel}」→ 提交申报</p>
        </div>
      </div>
    `;
  },

  renderDeductionDetails(matchResult) {
    const eligible = matchResult.deductions.filter(d => d.eligible);
    if (eligible.length === 0) {
      return `
        <div class="report-section">
          <h2 class="report-section-title">扣除项详情</h2>
          <p class="empty-hint">根据您填写的信息，暂无符合条件的专项附加扣除项。</p>
        </div>
      `;
    }

    return `
      <div class="report-section">
        <h2 class="report-section-title">扣除项详情与操作指引</h2>
        ${eligible.map(d => this.renderDeductionCard(d)).join('')}
      </div>
    `;
  },

  renderDeductionCard(d) {
    const displayMonthly = d.yourMonthlyShare !== undefined ? d.yourMonthlyShare : d.monthlyAmount;
    const displayAnnual = d.yourAnnualShare !== undefined ? d.yourAnnualShare : d.annualAmount;
    return `
      <div class="deduction-card" id="deduction_${d.id}">
        <div class="deduction-header">
          <h3>${d.title}</h3>
          <span class="amount-badge">${displayAnnual > 0 ? Calculator.formatMoney(displayAnnual) + '/年' : '据实扣除'}</span>
        </div>
        <div class="deduction-body">
          <div class="deduction-info">
            <div class="info-row">
              <span class="info-label">您方可扣月度金额</span>
              <span class="info-value">${displayMonthly > 0 ? Calculator.formatMoney(displayMonthly) + '/月' : '—'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">分配方式</span>
              <span class="info-value">${d.allocationMethod || '—'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">适用条件</span>
              <span class="info-value">${d.conditions || '—'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">所需材料</span>
              <span class="info-value">${(d.documents || []).join('、') || '—'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">APP操作路径</span>
              <span class="info-value">${d.appPath || '—'}</span>
            </div>
          </div>
          ${d.tips && d.tips.length > 0 ? `
            <div class="deduction-tips">
              <p class="tips-title">注意事项</p>
              <ul>
                ${d.tips.map(t => `<li>${t}</li>`).join('')}
              </ul>
            </div>
          ` : ''}
        </div>
      </div>
    `;
  },

  renderErrorWarnings(errorResult) {
    if (!errorResult.hasIssues) {
      return `
        <div class="report-section no-error-section">
          <div class="no-error-icon">✓</div>
          <p>未检测到常见填报错误，您的扣除信息看起来没问题！</p>
        </div>
      `;

  // 导出为图片（保存到相册）
  exportAsImage() {
    App.showToast('正在生成图片...');

    const target = document.getElementById('reportContent');
    if (!target) {
      App.showToast('未找到报告内容');
      return;
    }

    // 使用原生Canvas逐元素绘制报告图片（兼容所有手机浏览器）
    setTimeout(function() { Report.renderReportToCanvas(target); }, 100);
