  <style>
/* ===== 全局变量与重置 ===== */
:root {
  --primary: #1677ff;
  --primary-light: #4096ff;
  --primary-dark: #0958d9;
  --primary-bg: #e6f0ff;
  --success: #52c41a;
  --success-bg: #f0f9eb;
  --warning: #faad14;
  --warning-bg: #fffbe6;
  --error: #ff4d4f;
  --error-bg: #fff2f0;
  --text-primary: #1a1a1a;
  --text-secondary: #666;
  --text-tertiary: #999;
  --bg-page: #f5f6fa;
  --bg-card: #ffffff;
  --border: #e8e8e8;
  --border-light: #f0f0f0;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.1);
  --header-h: 56px;
  --nav-h: 56px;
  --max-w: 480px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
}

#app {
  max-width: var(--max-w);
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ===== 顶部导航 ===== */
.app-header {
  height: var(--header-h);
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(22, 119, 255, 0.2);
}

.header-back {
  background: none;
  border: none;
  color: #fff;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.header-title {
  flex: 1;
  text-align: center;
  font-size: 1.1rem;
  font-weight: 600;
  margin: 0 40px 0 40px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.header-spacer { width: 40px; }

/* ===== 主内容区 ===== */
.app-content {
  flex: 1;
  padding-bottom: calc(var(--nav-h) + 16px);
  overflow-y: auto;
}

/* ===== 底部导航 ===== */
.app-nav {
  height: var(--nav-h);
  background: var(--bg-card);
  border-top: 1px solid var(--border-light);
  display: flex;
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: var(--max-w);
  z-index: 100;
}

.nav-item {
  flex: 1;
  background: none;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  color: var(--text-tertiary);
  font-size: 0.7rem;
  cursor: pointer;
  padding: 6px 0;
  transition: color 0.2s;
}

.nav-item.active {
  color: var(--primary);
}

.nav-item span { font-size: 0.7rem; }

/* ===== 加载遮罩 ===== */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-page);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  gap: 16px;
  color: var(--text-secondary);
}

.loading-spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 10px 24px;
  border-radius: 8px;
  font-size: 0.85rem;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.toast.show { opacity: 1; }

/* ===== 首页 ===== */
.home-container {
  padding: 16px;
}

.hero-section {
  text-align: center;
  padding: 32px 16px 24px;
}

.hero-icon {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  font-size: 2rem;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  box-shadow: 0 4px 16px rgba(22, 119, 255, 0.3);
}

.hero-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text-primary);
}

.hero-subtitle {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-top: 8px;
}

.home-actions {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 24px;
}

.action-card {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}

.action-card:active {
  transform: scale(0.98);
}

.action-card.primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border: none;
  color: #fff;
}

.action-card.primary .action-text h3,
.action-card.primary .action-text p {
  color: #fff;
}

.action-icon {
  font-size: 1.8rem;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.action-text { flex: 1; }

.action-text h3 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-primary);
}

.action-text p {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

.action-arrow {
  color: var(--text-tertiary);
  flex-shrink: 0;
}

.action-card.primary .action-arrow { color: rgba(255,255,255,0.8); }

.home-features {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 16px 0;
}

.feature-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.feature-check {
  color: var(--success);
  font-weight: bold;
}

.home-policy-note {
  background: var(--primary-bg);
  border-radius: var(--radius);
  padding: 12px 16px;
  text-align: center;
  color: var(--primary);
  font-size: 0.85rem;
}

/* ===== 问卷 ===== */
.survey-container {
  padding: 16px;
}

.survey-progress-bar {
  position: relative;
  height: 28px;
  background: var(--border-light);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: 14px;
  transition: width 0.3s ease;
}

.progress-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: var(--text-primary);
  font-weight: 500;
}

.survey-section {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 20px 16px;
  box-shadow: var(--shadow);
}

.section-title {
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 20px;
  color: var(--text-primary);
}

.question {
  margin-bottom: 20px;
}

.question.error {
  animation: shake 0.3s;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

.q-label {
  display: block;
  font-size: 0.9rem;
  font-weight: 500;
  margin-bottom: 6px;
  color: var(--text-primary);
}

.required {
  color: var(--error);
  margin-left: 2px;
}

.q-subtitle {
  font-size: 0.75rem;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}

.input-group {
  display: flex;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--bg-page);
}

.input-group:focus-within {
  border-color: var(--primary);
  background: var(--bg-card);
}

.q-input {
  flex: 1;
  border: none;
  padding: 12px;
  font-size: 0.95rem;
  background: transparent;
  outline: none;
  color: var(--text-primary);
}

.input-suffix {
  padding: 0 12px;
  color: var(--text-tertiary);
  font-size: 0.85rem;
  white-space: nowrap;
}

/* summary 合计字段样式 */
.summary-field {
  margin-top: 16px;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary-bg), var(--primary-bg-light, #f0f7ff));
  border: 1px solid var(--primary-light, #b3d9ff);
  border-radius: var(--radius-md, 10px);
}

.summary-field .q-label {
  font-size: 1rem;
  font-weight: 600;
  color: var(--primary, #1677ff);
}

.summary-breakdown {
  margin: 10px 0;
}

.summary-breakdown-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 0.9rem;
  color: var(--text-secondary);
  border-bottom: 1px dashed var(--border-light, #e8e8e8);
}

.summary-breakdown-row.empty {
  color: var(--text-tertiary);
  justify-content: center;
  font-style: italic;
}

.summary-amount {
  font-weight: 500;
}

.summary-cap {
  font-size: 0.75rem;
  color: var(--warning, #fa8c16);
  margin-left: 4px;
}

.summary-total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 10px;
  margin-top: 4px;
  border-top: 2px solid var(--primary, #1677ff);
}

.summary-total-label {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-primary);
}

.summary-total-value {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--primary, #1677ff);
}

.q-select {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-size: 0.95rem;
  background: var(--bg-page);
  color: var(--text-primary);
  outline: none;
  appearance: auto;
}

.q-select:focus {
  border-color: var(--primary);
  background: var(--bg-card);
}

.q-date {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-page);
}

.boolean-group {
  display: flex;
  gap: 12px;
}

.bool-btn {
  flex: 1;
  padding: 12px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  font-size: 0.95rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}

.bool-btn.active {
  border-color: var(--primary);
  background: var(--primary-bg);
  color: var(--primary);
  font-weight: 600;
}

.radio-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.radio-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
}

.radio-item.checked {
  border-color: var(--primary);
  background: var(--primary-bg);
}

.radio-item input[type="radio"] {
  width: 20px;
  height: 20px;
  accent-color: var(--primary);
}

.radio-label {
  font-size: 0.9rem;
  color: var(--text-primary);
}

/* 动态列表 */
.dynamic-list .btn-add {
  margin-top: 8px;
  width: 100%;
  border: 2px dashed var(--border);
  padding: 10px;
  color: var(--primary);
  background: var(--bg-card);
}

.list-items {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.list-item {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  background: var(--bg-page);
}

.list-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
}

.btn-remove {
  background: none;
  border: none;
  color: var(--error);
  font-size: 1.3rem;
  cursor: pointer;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.q-date-sm, .q-select-sm {
  width: 100%;
  margin-bottom: 8px;
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.85rem;
  background: var(--bg-card);
  color: var(--text-primary);
}

.survey-actions {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}

.survey-actions .btn { flex: 1; }

/* ===== 按钮 ===== */
.btn {
  border: none;
  border-radius: var(--radius-sm);
  padding: 12px 20px;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.btn:active { transform: scale(0.98); }

.btn-primary {
  background: var(--primary);
  color: #fff;
}

.btn-secondary {
  background: var(--bg-page);
  color: var(--text-primary);
  border: 1px solid var(--border);
}

.btn-success {
  background: var(--success);
  color: #fff;
}

.btn-outline {
  background: transparent;
  color: var(--primary);
  border: 1px solid var(--primary);
}

.btn-lg {
  padding: 14px 24px;
  font-size: 1rem;
}

.btn-block {
  width: 100%;
}

/* ===== 报告页面 ===== */
.report-container {
  padding: 16px;
}

.report-header {
  text-align: center;
  padding: 20px 0;
  border-bottom: 1px solid var(--border-light);
  margin-bottom: 16px;
}

.report-header h1 {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text-primary);
}

.report-date {
  font-size: 0.8rem;
  color: var(--text-tertiary);
  margin-top: 4px;
}

.report-meta {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 12px;
  font-size: 0.85rem;
  color: var(--text-secondary);
}

.report-section {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}

.report-section-title {
  font-size: 1.05rem;
  font-weight: 600;
  margin-bottom: 12px;
  padding-left: 12px;
  border-left: 3px solid var(--primary);
  color: var(--text-primary);
}

.section-desc {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 16px;
}

.summary-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.summary-card {
  text-align: center;
  padding: 12px 4px;
  border-radius: var(--radius-sm);
  background: var(--bg-page);
}

.summary-card.highlight {
  background: var(--primary-bg);
}

.summary-card.positive {
  background: var(--success-bg);
}

.summary-card.negative {
  background: var(--error-bg);
}

.card-value {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.3;
}

.summary-card.highlight .card-value { color: var(--primary); }
.summary-card.positive .card-value { color: var(--success); }
.summary-card.negative .card-value { color: var(--error); }

.card-label {
  font-size: 0.7rem;
  color: var(--text-secondary);
  margin-top: 4px;
}

.report-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}

.report-table th {
  background: var(--bg-page);
  padding: 10px;
  text-align: left;
  font-weight: 500;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
}

.report-table td {
  padding: 10px;
  border-bottom: 1px solid var(--border-light);
}

.report-table tfoot td {
  border-top: 2px solid var(--border);
  border-bottom: none;
}

/* 税额明细框 */
.tax-detail-box {
  margin-top: 16px;
  padding: 14px;
  background: var(--bg-page);
  border-radius: var(--radius-sm);
}

.tax-detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.85rem;
  color: var(--text-secondary);
  padding: 5px 0;
}

.tax-detail-row span:first-child {
  color: var(--text-tertiary);
}

.tax-detail-row.total {
  border-top: 1px solid var(--border);
  margin-top: 6px;
  padding-top: 8px;
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text-primary);
}

.tax-detail-row.refund .tax-amount,
.tax-detail-row.refund .refund-amount {
  color: var(--success);
  font-size: 1.05rem;
  font-weight: 700;
}

.tax-detail-row.pay .pay-amount {
  color: var(--error);
  font-size: 1.05rem;
  font-weight: 700;
}

.tax-amount {
  color: var(--primary);
  font-size: 1.05rem;
  font-weight: 700;
}

.not-eligible-row { color: var(--text-tertiary); }

.status-tag {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 500;
}

.status-tag.eligible {
  background: var(--success-bg);
  color: var(--success);
}

.status-tag.not-eligible {
  background: var(--border-light);
  color: var(--text-tertiary);
}

/* 年终奖对比 */
.bonus-compare {
  display: flex;
  align-items: stretch;
  gap: 8px;
  margin: 16px 0;
}

.bonus-card {
  flex: 1;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.bonus-card.recommended {
  border-color: var(--primary);
  box-shadow: 0 0 0 2px var(--primary-bg);
}

.bonus-card-header {
  padding: 10px 12px;
  background: var(--bg-page);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.bonus-card.recommended .bonus-card-header {
  background: var(--primary-bg);
}

.bonus-label {
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text-primary);
}

.recommend-badge {
