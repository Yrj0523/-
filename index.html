  /**
   * 将报告DOM逐元素渲染到Canvas，然后打开为图片供用户长按保存
   * 这个方法不依赖外部库，不依赖SVG foreignObject，在所有手机浏览器上都能工作
   */
  renderReportToCanvas(target) {
    try {
      // 获取报告中所有可见元素
      const canvasWidth = 420;
      const padding = 20;
      const lineHeight = 22;
      let y = padding;

      // 收集要绘制的内容
      const blocks = [];

      // 报告标题
      const header = target.querySelector('.report-header');
      if (header) {
        const h1 = header.querySelector('h1');
        const date = header.querySelector('.report-date');
        const meta = header.querySelectorAll('.report-meta span');
        if (h1) blocks.push({ type: 'title', text: h1.textContent.trim() });
        if (date) blocks.push({ type: 'subtitle', text: date.textContent.trim() });
        meta.forEach(function(m) { blocks.push({ type: 'text', text: m.textContent.trim(), color: '#666' }); });
        blocks.push({ type: 'gap', height: 10 });
      }

      // 遍历所有section
      target.querySelectorAll('.report-section').forEach(function(section) {
        var sectionTitle = section.querySelector('.report-section-title, h2');
        if (sectionTitle) {
          blocks.push({ type: 'gap', height: 8 });
          blocks.push({ type: 'sectionTitle', text: sectionTitle.textContent.trim() });
        }

        var sectionDesc = section.querySelector('.section-desc');
        if (sectionDesc) blocks.push({ type: 'desc', text: sectionDesc.textContent.trim() });

        // 汇总卡片
        section.querySelectorAll('.summary-card').forEach(function(card) {
          var val = card.querySelector('.card-value');
          var label = card.querySelector('.card-label');
          if (val && label) {
            blocks.push({ type: 'card', value: val.textContent.trim(), label: label.textContent.trim() });
          }
        });

        // 表格行
        var tables = section.querySelectorAll('.report-table');
        tables.forEach(function(table) {
          var rows = table.querySelectorAll('tbody tr');
          rows.forEach(function(row) {
            var cells = row.querySelectorAll('td');
            if (cells.length >= 4) {
              var name = cells[0].textContent.trim();
              var monthly = cells[1].textContent.trim();
              var annual = cells[2].textContent.trim();
              var status = cells[3].textContent.trim();
              blocks.push({ type: 'tableRow', name: name, monthly: monthly, annual: annual, status: status });
            }
          });
          var tfootRow = table.querySelector('tfoot tr');
          if (tfootRow) {
            var cells = tfootRow.querySelectorAll('td');
            if (cells.length >= 3) {
              blocks.push({ type: 'tableRow', name: cells[0].textContent.trim(), monthly: '', annual: cells[2].textContent.trim(), status: '', bold: true });
            }
          }
        });

        // 税额计算明细
        section.querySelectorAll('.tax-detail-row').forEach(function(row) {
          var spans = row.querySelectorAll('span');
          if (spans.length >= 2) {
            var label = spans[0].textContent.trim();
            var value = spans[1].textContent.trim();
            var isTotal = row.classList.contains('total');
            blocks.push({ type: 'detailRow', label: label, value: value, bold: isTotal });
          }
        });

        // 年终奖对比卡片
        section.querySelectorAll('.bonus-card').forEach(function(card) {
          var label = card.querySelector('.bonus-label');
          if (label) blocks.push({ type: 'bonusTitle', text: label.textContent.trim() });
          card.querySelectorAll('.bonus-detail-row').forEach(function(row) {
            var spans = row.querySelectorAll('span');
            if (spans.length >= 2) {
              blocks.push({ type: 'detailRow', label: spans[0].textContent.trim(), value: spans[1].textContent.trim(), bold: row.classList.contains('total') });
            }
          });
        });

        // 节税提示
        var savings = section.querySelector('.bonus-savings');
        if (savings) {
          var span = savings.querySelector('span');
          var strong = savings.querySelector('strong');
          if (span && strong) {
            blocks.push({ type: 'highlight', text: span.textContent.trim() + strong.textContent.trim() });
          } else if (span) {
            blocks.push({ type: 'highlight', text: span.textContent.trim() });
          }
        }

        // 扣除详情卡片
        section.querySelectorAll('.deduction-card').forEach(function(card) {
          var h3 = card.querySelector('h3');
          var badge = card.querySelector('.amount-badge');
          if (h3) {
            blocks.push({ type: 'gap', height: 6 });
            blocks.push({ type: 'cardHeader', title: h3.textContent.trim(), badge: badge ? badge.textContent.trim() : '' });
          }
          card.querySelectorAll('.info-row').forEach(function(row) {
            var label = row.querySelector('.info-label');
            var value = row.querySelector('.info-value');
            if (label && value) {
              blocks.push({ type: 'detailRow', label: label.textContent.trim(), value: value.textContent.trim() });
            }
          });
          card.querySelectorAll('.tips-title').forEach(function(t) {
            blocks.push({ type: 'desc', text: '💡 ' + t.textContent.trim() });
          });
          card.querySelectorAll('.deduction-tips li').forEach(function(li) {
            blocks.push({ type: 'tip', text: '· ' + li.textContent.trim() });
          });
        });

        // 风险提示
        section.querySelectorAll('.error-group-title, .warning-item-title').forEach(function(el) {
          blocks.push({ type: 'desc', text: el.textContent.trim(), color: '#fa531c' });
        });
        section.querySelectorAll('.error-item .error-message, .warning-item .warning-message').forEach(function(el) {
          blocks.push({ type: 'tip', text: el.textContent.trim(), color: '#fa531c' });
        });

        // 操作指引
        section.querySelectorAll('.bonus-operation p, .operation-label').forEach(function(el) {
          blocks.push({ type: 'desc', text: el.textContent.trim() });
        });
      });

      // 计算总高度
      var totalHeight = padding * 2;
      blocks.forEach(function(b) {
        switch(b.type) {
          case 'title': totalHeight += 28; break;
          case 'subtitle': totalHeight += 18; break;
          case 'sectionTitle': totalHeight += 26; break;
          case 'gap': totalHeight += b.height; break;
          case 'card': totalHeight += 50; break;
          case 'tableRow': totalHeight += 22; break;
          case 'detailRow': totalHeight += 22; break;
          case 'bonusTitle': totalHeight += 24; break;
          case 'highlight': totalHeight += 30; break;
          case 'cardHeader': totalHeight += 24; break;
          case 'desc': totalHeight += 20; break;
          case 'tip': totalHeight += 20; break;
          case 'text': totalHeight += 18; break;
          default: totalHeight += 20;
        }
      });

      // 创建Canvas
      var canvas = document.createElement('canvas');
      var scale = 2; // 2倍清晰度
      canvas.width = canvasWidth * scale;
      canvas.height = totalHeight * scale;
      var ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);

      // 绘制背景
      ctx.fillStyle = '#f5f6fa';
      ctx.fillRect(0, 0, canvasWidth, totalHeight);

      y = padding;
      var maxWidth = canvasWidth - padding * 2;

      // 逐块绘制
      blocks.forEach(function(b) {
        switch(b.type) {
          case 'title':
            ctx.fillStyle = '#1677ff';
            ctx.font = 'bold 17px sans-serif';
            ctx.fillText(b.text, padding, y);
            y += 28;
            break;
          case 'subtitle':
            ctx.fillStyle = '#999';
            ctx.font = '12px sans-serif';
            ctx.fillText(b.text, padding, y);
            y += 18;
            break;
          case 'sectionTitle':
            // 蓝色背景条
            ctx.fillStyle = '#e6f4ff';
            ctx.fillRect(padding - 8, y - 16, canvasWidth - padding * 2 + 16, 24);
            ctx.fillStyle = '#1677ff';
            ctx.font = 'bold 15px sans-serif';
            ctx.fillText(b.text, padding, y);
            y += 26;
            break;
          case 'gap':
            y += b.height;
            break;
          case 'card':
            // 卡片背景
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(padding, y - 14, maxWidth, 44);
            ctx.strokeStyle = '#e8e8e8';
            ctx.strokeRect(padding, y - 14, maxWidth, 44);
            ctx.fillStyle = '#1677ff';
            ctx.font = 'bold 18px sans-serif';
            ctx.fillText(b.value, padding + 10, y + 8);
            ctx.fillStyle = '#666';
            ctx.font = '12px sans-serif';
            ctx.fillText(b.label, padding + 10, y + 24);
            y += 50;
            break;
          case 'tableRow':
            if (b.bold) {
              ctx.fillStyle = '#f0f5ff';
              ctx.fillRect(padding, y - 14, maxWidth, 22);
            }
            ctx.fillStyle = b.bold ? '#1677ff' : '#333';
            ctx.font = b.bold ? 'bold 13px sans-serif' : '13px sans-serif';
            ctx.fillText(b.name, padding, y);
            if (b.monthly) ctx.fillText(b.monthly, padding + 130, y);
            ctx.fillStyle = b.bold ? '#1677ff' : '#000';
            ctx.font = b.bold ? 'bold 13px sans-serif' : '13px sans-serif';
            ctx.fillText(b.annual, padding + 200, y);
            if (b.status) {
              ctx.fillStyle = '#52c41a';
              ctx.font = '11px sans-serif';
              ctx.fillText(b.status, padding + 290, y);
            }
            y += 22;
            break;
          case 'detailRow':
            ctx.fillStyle = b.bold ? '#1677ff' : '#333';
            ctx.font = b.bold ? 'bold 13px sans-serif' : '13px sans-serif';
            ctx.fillText(b.label, padding, y);
            // 右对齐金额
            ctx.textAlign = 'right';
            ctx.fillText(b.value, canvasWidth - padding, y);
            ctx.textAlign = 'left';
            y += 22;
            break;
          case 'bonusTitle':
            ctx.fillStyle = '#722ed1';
            ctx.font = 'bold 14px sans-serif';
            ctx.fillText(b.text, padding, y);
            y += 24;
            break;
          case 'highlight':
            ctx.fillStyle = '#f6ffed';
            ctx.fillRect(padding, y - 14, maxWidth, 26);
            ctx.fillStyle = '#52c41a';
            ctx.font = 'bold 13px sans-serif';
            ctx.fillText(b.text, padding + 5, y);
            y += 30;
            break;
          case 'cardHeader':
            ctx.fillStyle = '#262626';
            ctx.font = 'bold 14px sans-serif';
            ctx.fillText(b.title, padding, y);
            if (b.badge) {
              ctx.fillStyle = '#1677ff';
              ctx.font = 'bold 13px sans-serif';
              ctx.textAlign = 'right';
              ctx.fillText(b.badge, canvasWidth - padding, y);
              ctx.textAlign = 'left';
            }
            y += 24;
            break;
          case 'desc':
            ctx.fillStyle = b.color || '#666';
            ctx.font = '12px sans-serif';
            // 自动换行
            var words = b.text;
            while (words.length > 0) {
              var line = words.substring(0, 38);
              ctx.fillText(line, padding, y);
              y += 18;
              words = words.substring(38);
            }
            break;
          case 'tip':
            ctx.fillStyle = b.color || '#888';
            ctx.font = '12px sans-serif';
            var tipWords = b.text;
            while (tipWords.length > 0) {
              var tipLine = tipWords.substring(0, 36);
              ctx.fillText(tipLine, padding + 4, y);
              y += 18;
              tipWords = tipWords.substring(36);
            }
            break;
          case 'text':
            ctx.fillStyle = b.color || '#333';
            ctx.font = '13px sans-serif';
            ctx.fillText(b.text, padding, y);
            y += 18;
            break;
        }
      });

      // 转为图片
      var dataUrl = canvas.toDataURL('image/png');

      // 在新窗口打开图片，用户可以长按保存到相册
      var imgWindow = window.open('');
      if (imgWindow) {
        imgWindow.document.write(
          '<html><head><title>个税填报指引报告</title>'
          + '<meta name="viewport" content="width=device-width, initial-scale=1">'
          + '<style>'
          + 'body{margin:0;padding:0;background:#000;display:flex;flex-direction:column;align-items:center;min-height:100vh}'
          + 'img{max-width:100%;height:auto;margin-top:10px}'
          + '.tip{color:#fff;font-size:14px;padding:12px;text-align:center;background:#1677ff;width:100%;box-sizing:border-box;position:sticky;top:0}'
          + '</style></head><body>'
          + '<div class="tip">👇 长按图片保存到相册</div>'
          + '<img src="' + dataUrl + '" />'
          + '</body></html>'
        );
        imgWindow.document.close();
        App.showToast('图片已生成，长按保存到相册');
      } else {
        // 弹窗被拦截，降级为直接下载
        var link = document.createElement('a');
        link.download = '个税填报指引报告.png';
        link.href = dataUrl;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        App.showToast('图片已下载');
      }
    } catch(e) {
      console.error('Canvas render error:', e);
      App.showToast('图片生成失败，请尝试复制文本');
    }
  },

  // 分享报告（调用系统分享）
  shareReport() {
    var target = document.getElementById('reportContent');
    if (!target) {
      App.showToast('未找到报告内容');
      return;
    }

    // 提取报告纯文本摘要
    var lines = [];
    var header = target.querySelector('.report-header h1');
    if (header) lines.push(header.textContent.trim());

    target.querySelectorAll('.summary-card').forEach(function(card) {
      var val = card.querySelector('.card-value');
      var label = card.querySelector('.card-label');
      if (val && label) lines.push(label.textContent.trim() + '：' + val.textContent.trim());
    });

    target.querySelectorAll('.tax-detail-row').forEach(function(row) {
      var spans = row.querySelectorAll('span');
      if (spans.length >= 2) {
        lines.push(spans[0].textContent.trim() + '：' + spans[1].textContent.trim());
      }
    });

    target.querySelectorAll('.deduction-card .deduction-header h3').forEach(function(h3) {
      lines.push('✓ ' + h3.textContent.trim());
    });

    target.querySelectorAll('.bonus-savings').forEach(function(el) {
      var span = el.querySelector('span');
      var strong = el.querySelector('strong');
      if (span && strong) lines.push(span.textContent.trim() + strong.textContent.trim());
    });

    lines.push('');
    lines.push('—— 由「个税申报助手」生成');

    var shareText = lines.join('\n');
    var shareData = {
      title: '个税填报指引报告',
      text: shareText,
      url: location.href
    };

    if (navigator.share) {
      navigator.share(shareData).then(function() {
        App.showToast('分享成功');
      }).catch(function(err) {
        if (err.name !== 'AbortError') {
          // 分享失败，降级为复制
          Report.fallbackShare(shareText);
        }
      });
    } else if (navigator.clipboard) {
      Report.fallbackShare(shareText);
    } else {
      // 最终降级：选中文本
      Report.fallbackShare(shareText);
    }
  },

  // 降级分享：复制到剪贴板
  fallbackShare(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        App.showToast('报告内容已复制，可粘贴到微信/QQ分享');
      }).catch(function() {
        Report.fallbackShareLegacy(text);
      });
    } else {
      Report.fallbackShareLegacy(text);
    }
  },

  fallbackShareLegacy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      App.showToast('报告内容已复制，可粘贴分享');
    } catch(e) {
      App.showToast('复制失败，请手动选择文本');
    }
    document.body.removeChild(ta);
  },

  // 导出为文本（复制到剪贴板）
  exportAsText() {
    const target = document.getElementById('reportContent');
    if (!target) {
      App.showToast('未找到报告内容');
      return;
    }

    let text = '========== 个税填报指引报告 ==========\n';
    text += '生成日期：' + new Date().toLocaleDateString('zh-CN') + '\n\n';

    // 提取汇总表格
    target.querySelectorAll('.report-section').forEach(function(section) {
      const title = section.querySelector('.report-section-title');
      if (title) text += '\n【' + title.innerText + '】\n';

      // 表格
      section.querySelectorAll('.report-table').forEach(function(table) {
        table.querySelectorAll('tr').forEach(function(row) {
          const cells = row.querySelectorAll('th,td');
          const rowData = [];
          cells.forEach(function(cell) {
            rowData.push(cell.innerText.trim());
          });
          if (rowData.length > 0) text += rowData.join(' | ') + '\n';
        });
      });

      // 汇总卡片
      section.querySelectorAll('.summary-card').forEach(function(card) {
        const val = card.querySelector('.card-value');
        const label = card.querySelector('.card-label');
        if (val && label) text += label.innerText + ': ' + val.innerText + '\n';
      });

      // 税额明细
      section.querySelectorAll('.tax-detail-row').forEach(function(row) {
        const spans = row.querySelectorAll('span');
        if (spans.length >= 2) text += spans[0].innerText + ': ' + spans[1].innerText + '\n';
      });

      // 扣除项详情
      section.querySelectorAll('.deduction-card').forEach(function(card) {
        const h3 = card.querySelector('h3');
        if (h3) text += '\n■ ' + h3.innerText + '\n';
        card.querySelectorAll('.info-row').forEach(function(row) {
          const label = row.querySelector('.info-label');
          const value = row.querySelector('.info-value');
          if (label && value) text += '  ' + label.innerText + ': ' + value.innerText + '\n';
        });
      });

      // 年终奖对比
      section.querySelectorAll('.bonus-card').forEach(function(card) {
        const label = card.querySelector('.bonus-label');
        const total = card.querySelector('.bonus-total');
        if (label) text += '\n' + label.innerText + '\n';
        card.querySelectorAll('.bonus-detail-row').forEach(function(row) {
          const spans = row.querySelectorAll('span');
          if (spans.length >= 2) text += '  ' + spans[0].innerText + ': ' + spans[1].innerText + '\n';
        });
        if (total) text += '  总税额: ' + total.innerText + '\n';
      });

      // 风险提示
      section.querySelectorAll('.error-item').forEach(function(item) {
        const title = item.querySelector('.error-title');
        const msg = item.querySelector('.error-message');
        const sol = item.querySelector('.error-solution');
        if (title) text += '\n⚠ ' + title.innerText + '\n';
        if (msg) text += '  ' + msg.innerText + '\n';
        if (sol) text += '  ' + sol.innerText + '\n';
      });
    });

    text += '\n========== 政策依据 ==========\n';
    text += '《个人所得税专项附加扣除暂行办法》\n';
    text += '全年一次性奖金政策延续至2027年12月31日\n';
    text += '如有疑问请咨询税务机关：12366\n';

    // 复制到剪贴板
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        App.showToast('报告内容已复制到剪贴板');
      }).catch(function() {
        Report.downloadText(text);
      });
    } else {
      Report.downloadText(text);
    }
  },

  // 降级：下载文本文件
  downloadText(text) {
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const link = document.createElement('a');
    link.download = '个税填报指引报告_' + new Date().toLocaleDateString('zh-CN').replace(/\//g, '') + '.txt';
    link.href = URL.createObjectURL(blob);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
    App.showToast('报告已下载为文本文件');
  }
};

      this.hideLoading();
      if (!this.dataLoaded) {
        this.renderHome();
      }
    }, 5000);

    try {
      // 注册内联 Service Worker（用于PWA离线缓存，file:// 协议跳过）
      if ('serviceWorker' in navigator && location.protocol !== 'file:') {
        var swCode = 'var CACHE_NAME="tax-assistant-v1";'
          + 'self.addEventListener("install",function(e){self.skipWaiting();});'
          + 'self.addEventListener("activate",function(e){e.waitUntil(self.clients.claim());});'
          + 'self.addEventListener("fetch",function(e){'
          + 'if(e.request.method!=="GET")return;'
          + 'e.respondWith(caches.match(e.request).then(function(r){'
          + 'return r||fetch(e.request).then(function(resp){'
          + 'var clone=resp.clone();caches.open(CACHE_NAME).then(function(c){c.put(e.request,clone);});return resp;'
          + '}).catch(function(){return r;});}));});';
        var swBlob = new Blob([swCode], { type: 'application/javascript' });
        var swUrl = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swUrl).catch(function(err) {
          console.warn('SW registration failed:', err);
        });
      }

      // 初始化存储（IndexedDB 或 localStorage 降级）
      await Storage.init();

      // 初始化各模块（数据已内嵌在 TaxData 中，无需 fetch）
      await Promise.all([
        Survey.init(),
        Calculator.init(),
        RulesEngine.init(),
        ErrorChecker.init()
      ]);

      this.dataLoaded = true;
      this.hideLoading();
      clearTimeout(forceTimeout);
      this.renderHome();

      // 绑定导航事件
      this.bindNavigation();
      this.bindHeaderBack();
      this.bindPWAInstall();
    } catch (err) {
      console.error('Init error:', err);
      this.hideLoading();
      clearTimeout(forceTimeout);
      this.showError(err);
    }

    });

  triggerInstall() {
    if (this.deferredPrompt) {

      if (isIOS) {

      } else {

  // ===== 工具方法 =====

  showToast(message, duration) {
    let toast = document.getElementById('toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'toast';
      toast.className = 'toast';
      document.body.appendChild(toast);
    }
    toast.textContent = message;
    toast.classList.add('show');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => toast.classList.remove('show'), duration || 3000);
  }
